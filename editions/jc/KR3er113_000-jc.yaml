front:
  text: 自序先高曾祖世業岐黃至先祖儀亭公而名尤噪蘭垣方數十里內活人無算咸稱之為朱三爺蓋彼時蘭州城小居眾亦不多也猶憶家之南廳懸有涼州教諭孫壽山題贈匾額一方文為丹溪品望嗣配劉永析先生撰書板朕一幅文日承家有柏廬格言垂老不忘修己法救世守椿庭遺教畢生能讀活人書岩兒時嘗聞先君述及先祖為人治病之狀診脈必反復再三遣藥則審慎斟酌用量即分釐不苟遇邀診雖丙夜必往以未能就診者多屬重症也診次必囑病家務將藥後症狀見告歸家後恆眠竟夜不安枕晨明即傾聽釦環之輕重以判病者之安危其視病者若己之病也如此高祖王父年遠闕聞惟家之北堂亦懸有甘肅桌司鄧承偉鳴謝先曾祖序東公之匾額題曰年高德邵並敘其來蘭前屢有子而屢殤於痘遇痘症則闔家惴惴主篆蘭垣後又有子病痘及延先曾祖而活之之狀於後稱先曾祖為蘭之有道君子堂東西側系鄧氏撰贈之板聯文為笑我雪盈顛甚望兒曹娛白髮是誰春在手竟從人海遇丹溪是先曾祖亦蘭垣醫之巨擘也此稿乃先曾祖診余閱讀醫學心悟時眉端所記先祖亦有補記約成於清咸豐至光緒間原作於孫習醫繩墨未敢炫術示人世代讀誦書角為圓眉顛字跡已多不可辨識為兔年久湮沒恭謹整錄其闕奪難辨處由岩逐一揣摩校補如有訛謬乃岩之過非原記有誤也顏曰醫學心悟雜症要義復恐貽人以炫示之誚蛛網塵封者垂三十年轉念活人之術韞櫝而藏何如公諸於世尚可獲匡謬補闕之得又何憾焉爰商之甘肅中醫學院鄭元成館長復蒙中醫古籍出版社傅景華社長鼎力支持得以刊行古道熱腸歿存銘感倘有能為同道參酌以資涓埃之助者何幸如之朱太岩謹述時年七十五歲一九九一年春
