body:
  text: 中風門中風者其中風也有中腑中臟中血脈之殊中腑者中在表也外有六經之形症與傷寒六經傳變之症無異也中太陽用柱枝湯中陽明葛根湯加桂枝中少陽小柴胡湯加桂枝其法悉具傷寒門慈不贅此一段是傷寒論三陽傷風表症與中風門全無關涉又腑字空作經字若云入腑則里症矣安用葛根桂枝耶中臟者中在裡也其人眩僕昏冒不省人事或痰聲如曳鋸宜分臟腑寒熱而治之假如其人素挾風寒或暴中新寒則風水相遭寒冰徹骨而風為寒風矣此一段即傷寒陰症亦與中風門無涉假如其人素有積熱或鬱火暴發則風乘火勢火借風威而風為熱風矣自此段起方是中風門為熱風多見閉症其症牙關緊急兩手握固法當疏風開竅先用搐鼻散吹之次用牛黃丸灌之若大便閉結腹滿脹悶火勢極盛者以三化湯攻之言熱風者多系腎水過虛之人法當遵丹溪大劑滋陰攻之一法須慎用也為寒風多見脫症其症手撒脾絕眼合肝絕口張心絕聲如鼾肺絕遺尿腎絕更有兩目直視搖點上竄髮直如妝汗出如珠皆脫絕之症法當溫補元氣急用火劑附子理中湯灌之若痰涎壅盛以三生飲加人參灌之間亦有寒痰壅塞介乎閉脫之間不便驟補者用半夏橘紅各一兩濃煎至一杯以生薑自然汁對衝頻頻灌之其人即延然後按其虛而調之言寒者即陽虛之人也此段所論甚是宜格遵之惟三生飲用以救急誠為良法但分量太重無已照原方三分之一可也然予自揣生平用附子理中治愈者甚多其用牛黃丸治愈者亦恆有之惟三化湯一方並未舉用此必天時地土人事之不同然寒熱之劑屹然並立古方具在法不可泥故兩存之以備參酌法雖並存然遇此症而用大黃未有不殺人者三化湯慎用牛黃丸取其消痰順氣亦初起暫用之法耳五七日後須遵俞氏塞空之旨用侯氏黑散法也口噤角弓反張痙病也但口襟而兼反張者是已成痙也小續命湯口噤而不反張者是未成痙也大秦艽湯此條宜摘入痙症之下蓋痙症極重不遇角弓反張不致口噤也又小續命湯內有麻黃係指傷寒痙症芥表症者風痙當去之大秦艽湯治風中經絡口眼歪斜半身不遂或語言寒澀乃血弱不能養於筋宜用養血疏風之劑經云治風先治血血行風自滅是也秦艽一錢五分甘草炙川芎當歸芍藥生地熟地自制茯苓羌活獨活白朮防風白芷黃芩酒炒各八分細辛二分水煎服如或煩躁口渴加石膏一錢五分陰雨加生薑三片春夏加知母八分此治風初起之方只可一二服若用以舒筋則羌防細辛當減威靈仙鉤藤當加又中風者命門多虛知母當慎用神仙解語丹白附子炮石菖蒲去毛遠志去心甘草水浸炒天麻全蠍去尾甘草水洗羌活南星牛膽制多次更佳各一兩木香五錢為末麵糊丸龍眼大每服一丸薄荷湯下此方用之屢效不但治中風不語兼治夏間陰寒痧症地黃飲子熟地九蒸曬二錢馬戟去心山萸肉去核肉蓯蓉酒浸焙石斛附子炮五味子杵炒白茯苓各一錢石菖蒲去毛桂心麥冬去心遠志去心甘草水泡炒各五分入薄荷少許姜一片棗二枚水煎服氣虛加人參二錢用菖蒲恐引熱藥入心竅轉致中焦熱有痰迷之慮慎之類中風類中風者謂火中虛中濕中寒中暑中氣中食中惡中也共有八種與真中相類而實不同也然類中有與真中相兼者須細察其形症而辨之類中即景岳所謂非風景岳於此篇後各症雜例不如此書明分八條為易曉也至與真中相兼者仍作中風治其各症用藥亦兼及之凡真中之症必連經絡多見歪斜偏廢之候與類中之專氣致病者自是不同然而風乘火勢邪乘虛入寒風相搏署風相炫飲食招風種種變症所在多有務在詳辨精細寒甚血凝則筋縮熱甚血耗筋亦縮皆能牽引偶然歪斜惟真中之歪斜必口吐涎沫日甚一日而寒熱牽引之歪斜旋髮旋止口無涎沫也或問火中而用桂附者何也答曰腎陽飛越則丹田虛冷其痰涎上壅者水不歸原也面赤煩躁者火不歸原也惟桂附八味能引火歸原火歸水中則水能生木木不生風而風自熄矣內風皆生於肝皆緣腎虛妙義無多已發真中之源勿徒作火門看也濕中者即痰中也凡人嗜食肥甘或醇酒乳酪則濕從內受或山嵐瘴氣久雨陰晦或運行涉水坐臥濕地則濕從外受濕生痰痰生熱故卒然昏倒無知也蒼白二陳湯主之此症甚多其人無不虛者一二劑利痰之後即當補氣健脾凡人暴中於寒卒然口鼻氣冷手足厥冷或腹癰下利清穀或身體強硬口噤不語四肢戰搖此寒直中於里也宜用姜附湯或附子理中湯加桂主之此即醫門法律中寒病也與風門無涉凡此症投以桂附之後筋脈乍舒必見手指搐搦眼動唇搖之象切不可再投風藥七情氣結或怒動肝氣以致氣逆痰壅牙關緊急極與中風相似但中風身熱中氣身涼中風脈浮中氣脈沉且病有根由必須細究宜用木香調氣散主之真中風其脈多閉浮者少中氣肝脈有極大者只當舍脈問症醉飽過度或者惱怒以致飲食填塞胸中胃氣不行卒然昏倒宜用橘紅二兩生薑一兩炒鹽一撮煎湯灌而吐之次用神朮散和之吐法不可輕用木香調氣散平肝氣和胃氣白蔻仁去殼研檀香木香各一兩丁香三錢香附五兩藿香四兩甘草炙砂仁陳皮各三兩為細末每服二錢入鹽少許點服體虛者服四五分可也傷暑霍亂攪腸沙更有乾霍亂症欲吐不得吐欲瀉不得瀉攪腸大癰變在須臾古方以燒鹽和陰陽水引而吐之或以陳皮同煎吐之或用多年陳香圓煎湯更佳俗名攪腸沙鳥沙脹皆此之類此症甚急危在傾刻取藥不及先灌陰陽水並刺腿彎青筋出血再刺是二指上青筋如出血則漸減其用藥總以厚朴為君干香圓佛手亦妙甚者加檀香蓋脾得香氣即舒舒則能吐能瀉矣清暑益氣湯預服此藥以防暑氣黃耆一錢五分白朮一錢人參當歸陳皮麥冬去心甘草炙各五分扁豆二錢茯苓七分升麻柴胡北五味各三分神麯四分黃柏澤瀉各二分參耆閉氣若受暑反不能出矣暑症一篇句句明晰誠臨症之金針平時揣摩當於醫門法律暑濕熱三氣門合參一言以蔽之暑氣傷脾當用氣香行動之藥如厚朴藿香砂仁香薷佛手香圓之類疫癧天行之氣從經絡入其症頭痛發熱宜微散香蘇散散之病氣傳染從口鼻入其症嘔惡胸滿宜解穢神朮散和之天行之氣亦從口鼻而入當遵吳氏溫疫論但吳氏達原飲中只有草果檳榔厚朴而無芳香解穢之藥宜加入藿香澤蘭再以四時隨有香花塞鼻孔中屢換以驅穢氣取效更速又有頭面腫大名曰大頭瘟者頸項粗腫名曰蝦蟆瘟者古方普濟消毒飲並主之但頭腫之極須用針砭若醫者不究其理患者畏而不行多致潰裂腐爛而難救若頸腫之極須用橘紅淡鹽湯吐去其痰再用前方倍甘橘主之須以早治不可忽也此症屬雜疫門劉松峰補註溫疫論治法甚詳以大頭蝦蟆二症言之普濟消毒飲中涼藥皆須用酒炒過以桔梗三五錢煎湯再煎各藥方能取效急以針刺少商臺谷二穴出血庶乎可治此等症針刺之功十之七藥之功十之三耳或問香蘇散神朮散芳香藥也人中黃有穢氣者也而皆以之解疫毒消穢氣何也不知邪容上焦乃消虛之所故以芳香以解之邪客中下二焦刀濁陰之所疫毒至此結而為穢則非芳香所能解必須以穢攻穢而穢氣始除此人中黃之用所以切當也以穢藥引香藥方能驅穢以穢藥引下藥方能逐穢以穢藥引表藥方能散穢非只用穢藥也若只用穢藥是益其穢矣須知溫疫一症吳氏獨得其源更當參以葉氏芳香之法逐穢至傳經入里等症不外傷寒汗吐下三法但表解不用麻黃耳此篇治法謹慎但恐藥力不及且用藥宜泛想其時吳氏溫疫論尚未盛行也治疫清涼散秦艽赤芍知母貝母連翹各一錢荷葉七分丹參五錢柴胡一錢五分人中黃二錢水煎服如傷食胸滿加麥芽山楂蘿蔔子陳皮脅下痞加鱉甲枳殼昏憒譫語加黃連熱甚大渴能消水者加石膏天花粉人參便閉不通腹中脹滿者加大黃下之虛人自汗多倍加人參津液枯少更加麥冬生地若時行寒疫不可輕用涼藥宜斟酌投劑譫語下症多當酌用大黃勿輕用黃連寒疫詳見補註溫疫論治法不過於芳香藥中多加姜耳萬勿輕投桂附蓋初起雖是寒氣久則正氣閉塞邪氣有餘便是火也虛勞凡虛勞之症多見吐血疚湧發熱夢遺經閉以及肺痿肺疽咽痛音啞側臥傳屍鬼疰諸疾今照葛仙翁十藥神書例增損方法臚列於左以便觀覽虛勞症惟有醫門法律建中湯行營氣一法深合經旨然驟用駭人聽聞其次莫如此書之法穩妥平善遇善養之人十中亦愈三四後列生地黃湯清骨散兩方內皆可參入桂枝大棗等藥兩書參看甲字號方止嗽散為主予見虛損之成多由於吐血吐血之因多由於咳嗽咳嗽之原多起於風寒仲景云咳而喘息有音甚則吐血者用麻黃湯東垣師其意改用麻黃人參芍藥湯可見咳嗽吐紅之症多有因於外感者不可不察也仲景用麻黃是傷寒症內寒氣束肺之症東垣以之治些微風寒之嗽已覺過劑若施之虛勞之人煽其肺耗其液有不速死者乎月華丸滋陰降火消痰祛瘀止咳定喘保肺平肝消風熱殺屍蟲此陰虛發咳之聖藥也天冬去心蒸麥冬去心蒸生地酒洗熟地九蒸曬山藥乳蒸百部蒸沙參蒸川貝母去心蒸真阿膠各一兩茯苓乳蒸獺肝廣三七各五錢用白菊花去蒂二兩桑葉經霜者二兩熬膏將阿膠化入膏內和藥稍加煉蜜為丸如彈子大每服一丸噙化日三服此藥用鮮藕汁半茶杯同化服治虛勞吐血如神已屢試之矣丙字號方治大吐血咸升斗者先用花蕊散止之隨用獨參湯樸之所謂血脫益氣陽生陰長之理貧者以歸脾湯代之余臨此症甚多面黃脈虛大者可治脈微弱者亦可治面赤脈堅搏者難治脈硬者必死總以先飲童便為救急第一妙方隨加炒黑梔子灌之然後服藥此症危在呼吸陽氣固當急救陰血亦應驟滋但非歸地所能奏功徽州汪前輩每用豬心肺脾洗淨熬濃湯頻頻飲之間服加味歸脾湯十愈四五歸脾湯白朮人參當歸棗仁炒白芍各一錢黃耆一錢五分遠志去心泡七分甘草炙五分龍眼肉五枚歸脾湯內去木香加炒黑梔子炒黑桑白皮標本兼治為當按本書心痛篇歸脾湯內有木香丁字號方治咳嗽吐紅漸成骨蒸勞熱之症如人胃強氣盛大便結脈有力此陽盛生熱法當清涼清骨散主之若胃虔脾弱大便溏脈虛細此陰虛發熱法當養陰逍遙散四物湯主之若氣血而虛而發熱者八珍湯主之若元氣大虛變症百出難以名狀不同其脈不論其病但用人參養榮湯堵症自退經云甘溫除大熱如或誤用寒涼反伐生氣多至不救此條自若元氣大虛以下為行醫之要決八珍補陽陽亢而陰愈竭芩連清熱熱退而真元敗矣柴胡散火火散而汗動汗動而陰耗矣取效目前無捷於此而其人則未有不死者何如用地黃地骨皮沙參百合加入去皮桂枝大棗飴糖以充營氣營氣行熱自退理詳醫門法律虛勞門戊字號方保和湯治肺痿知母蒸五分貝母三錢天冬去心麥冬去心各一錢苡仁五錢北五味十粒甘草桔梗馬兜鈴百合阿膠蛤粉炒成珠各八分薄荷二分水煎入飴糖一匙溫服虛者加人參加味桔梗湯治肺痿桔梗去蘆白及橘紅甜葶藶微炒各八分甘草節貝母各一錢五分苡仁金銀花各五錢水煎服初起加荊芥防風各一錢潰後加人參黃耆各一錢此二方極好當移入肺痿肺癰門與醫宗金鑑本門合參他書皆偏不可盡信也盡信書則不如無書己字號方百藥煎散治咽痛百藥煎五錢硼砂一錢五分甘草二錢為末每服一錢米飲調食後細細嚥之通音煎治音啞白蜜一斤川貝母去心為末一兩款冬花去梗為末二兩胡桃肉去衣研爛十二兩四味和勻飯上蒸熟不拘時開水點服此二方皆經驗方臨時可以暫用庚字號方秘精丸有相火必生濕熱則水不清不清則不固故本方以理脾導濕為先濕祛水清而精自止矣治濁之法亦然白朮山藥茯苓茯神蓮子肉去心蒸各二兩芡實四兩蓮花須牡蠣各一兩五錢黃柏五錢車前子三兩共為末金櫻膏為丸如桐子大每服七八十丸開水下氣虛者加人參一兩此方宜去黃柏加丹皮辛字號方澤蘭湯調經通血脈治經閉澤蘭二錢柏子仁當歸白芍熟地牛膝茺蔚子各一錢五分水煎服其經閉非海螵蛸不開若只是後期此藥最當壬字號方驅蟲丸明雄黃一兩蕪荑雷丸鬼箭羽各五錢獺肝一具丹參一兩五錢麝二分五釐煉蜜丸如桐子大每食後開水下十九日三服此藥太輕且麝香散氣虛脫真元本草綱目獺肝下附方內有三二簡明者可參考癸字號方補天大造丸補五臟虛損人參二兩黃耆蜜炙白朮陳土蒸各三兩當歸酒蒸棗仁去殼炒遠志去心甘草水泡炒白芍酒炒山藥乳蒸茯苓乳蒸各一兩五錢枸杞子酒蒸大熟地九蒸曬各四兩河車甘草水洗一具鹿角熬膏一斤龜版與鹿角同熬膏八兩以龜鹿膠和藥加煉蜜為丸每早開水下四錢陰虛內熱甚者加丹皮二兩陽虛內寒者加肉桂五錢此藥全仗河車不必人參但有高麗參真有起死回生之功咳嗽風寒初起頭痛鼻塞發熱惡寒而咳嗽者用止咳散加荊芥防風蘇葉生薑以散邪既散而咳不止專用本方調和肺氣或兼用人參胡桃湯以潤之外邪未淨時人參不可輕用若中寒入里而咳者但溫中而咳自止溫中亦須潤肺百合沙參不可少也凡治咳嗽貴在初起得法為善經云微寒微咳咳嗽之因屬風寒者十居其丸故初治必須發散而又不可以過散不散則邪不去過散則肺氣必虛皆令纏綿難愈肺主皮毛風邪易入且太陽上部之脈皆絡於肺表藥亦入太陽凡傷寒傷風初起而兼嗽者嗽則胸痛不可忍鼻塞聲重鼻流清涕之時當以防風力君屢以防風煎湯送止咳散收效甚捷止咳散治諸般咳嗽桔梗炒荊芥紫菀蒸百部蒸白前蒸各二斤甘草炒十二兩陳皮水洗去白一斤共為末每服三錢開水調下食後臨臥服初感風寒生薑湯調下予制此藥普送只前七味服者多效或問藥極輕微而取效甚廣何也予曰藥不貴險峻惟期中病而已此方系予苦心揣摩而得也蓋肺體屬金畏火者也過熱則咳金性剛燥惡冷者也過寒亦咳且肺為嬌臟攻擊之劑既不任受而外主皮毛最易受邪不行表散則邪氣留連而不解經曰微寒微咳寒之感也若小寇然啟門逐之即去矣醫者不審妄用清涼酸澀之劑未免閉門留寇寇俗出而無門必至穿窗而走則咳而見紅肺有二竅一在鼻一在喉鼻竅貴開而不閉喉竅宜閉而不開今鼻竅不通則喉竅將啟能無慮乎本方濕潤和平不寒不熱既無攻擊過當之虞大有啟門驅賊之勢是以客邪而散肺氣安寧宜其投之有效欽附論與此以咨明哲咳嗽一篇精微明顯可奉為金科玉律止咳散一方用之如神但百部必須蒸透去心方可不然其毒傷肺同一風也在冬月為寒風宜加款冬花在春月為溫風宜加桑葉痰中帶血者本方加丹參赤芍立止如神咳嗽之病篇中已敘七八其未敘者皆詳臨症指南本門有方有案合參可也喘夫外感之喘外出於肺內傷之喘未有不由於腎者經云堵痿喘嘔皆屬於下定喘之法當於腎經責其真水真火之不足而主之如或脾氣大虛則以人參白朮為主參朮補脾土以生肺金金旺則能生水乃隔二隔三之治也治喘症以納腎氣為主納腎氣以磁石為主偏寒佐以鹿茸熟地故紙偏熱佐以熟地地骨皮龜版喘之後肺氣必傷以麥冬配人參加山藥蓮子補土生金無熱量加白朮吐血暴吐血以祛瘀為主而兼之降火久吐血以養陰為主而兼之理脾古方四生丸十灰散花蕊石散祛瘀降火之法也古方六味湯四物湯四君子湯養陰樸脾之法也然血症有外感內傷之不同假如咳而喘息有音甚則吐血者此風寒也加味香蘇散散之務農赤日行旅長途口渴自汗而吐血者此傷暑也益元散清之夏令火炎更乘秋燥發而乾咳脈數大而吐血者此燥火焚金也三黃解毒湯降之此外感之治法也又如陰虛吐血者初用四生丸十灰散以化之兼用生地黃湯以清之吐止則用地黃丸補之陽虛大吐血成升斗者初用花蕊石散以化之隨用獨參湯以補之繼則用四君八珍等以調之臟寒吐血如天寒地凍水凝成冰也用理中湯以溫之其或七情氣結怒動肝火者則用加味逍遙散以疏達之傷力吐血者則用澤蘭湯行之此內傷之治法也夫血以下行為順上行為逆吐暴之時氣血未表飲食如常大便結實法當導之下行病勢既久氣血衰微飲食漸減大便不實法當養陰血兼補脾氣大凡吐血咯血須用四君子之類以收功蓋陰血生子陽氣脾土旺則能生血耳治者念之統觀吐血一篇與前虛勞門參看治法詳備所列各方治標者多治本者少皆可暫用而其中致病之固未備臨症指南內諸法皆備其中菸酒傷肺二條尤切今日之症宜合參之頭痛偏頭風者半邊頭病有風熱有血虛風熱者筋脈抽搐或鼻塞常流濁涕精空膏主之血虛者晝輕夜重痛連眼角逍遙散主之血虛頭痛宜四物湯加黃精以補其腦腎厥頭痛者頭重足浮腰膝痠軟經所謂下虛上實是也腎氣衰則下虛浮火上泛故上實也然腎經有真水虛者脈必數而無力有其火虛者脈必大而無力水虛六味丸火虛八味丸火虛則腎寒脈多沉堅按之如鐵條者多總以腰痛脊冷定為陽虛發燒手足心皆熱定為陰虛盡信脈恐誤事破腦傷風者風從破處而入其症多發搐搦防風散主之凡治破傷風防風散服一劑以驅風后急應服魚螵艾葉醫宗金鑑內有江螵丸一方最為靈效心痛氣痛者氣壅攻刺而痛遊走不定也沉香降氣散主之血痛者痛有定處而不移轉側若刀錐之刺手拈散主之熱痛者舌燥唇焦溺赤便閉喜冷畏熱其痛或作或止脈洪大有力清中湯主之寒痛者其痛暴發手足厥冷口鼻氣冷喜熱畏寒其痛綿綿不休脈沉細無力姜附湯加肉桂主之飲痛者水飲停積也嘔吐涎或咳或噎甚則搖之作水聲脈弦滑小半夏加茯苓湯主之食病者傷於飲食心胸脹悶手不可按或吞酸噯腐脈緊滑保和湯主之虛痛者心悸怔忡以手按之則痛止歸脾湯主之蟲痛者面白唇紅或唇之上下有白斑點或口吐白沫飢時更甚化蟲丸主之疾病者觸冒邪祟卒爾心痛面目青黯或昏憒譫語脈來乍大作小或兩手如出兩人神朮散蔥白酒生薑湯並主之此治心痛之大法也綜觀篇內氣血寒熱飲食及虛痛等症治法詳明列症顯亮後列諸方平穩可用惟皆系下泄之藥宜於病勢正盛之時若病已將開身體弱損者仍當遵建中意用人參桂枝大棗甘草使中焦之氣血旁行不專下泄自然流布於四體結開痛止庶無暴脫之患緣心痛不比他臟之病用藥稍差性命即危無結滯則不痛而其結滯又不可急攻只須緩緩開解更不可用黃耆大補一驟補則瘀血攻心矣暑月更不可補臨症指南本篇內受驚心漾漾作痛逍遙散去柴胡加鉤藤丹皮勞傷血滯用生鹿角當歸鬚桃仁半夏生薑營絡傷急心痛用人參桂枝炙草白蜜川椒亦即建中行營之義其法出金匱要略是此篇主腦手拈心治血積心痛元胡索醋炒香附酒炒五靈脂去土醋炒沒藥箬上炙乾等分共為細末每服三錢熱酒調下血老者用紅花五分桃仁十粒煎酒調下此古方也用之甚效然體虛之人有血動心搖傾刻垂危之慮實見此症亦只用一錢可也胸痛胸者肺之分野然少陽膽經受病亦令胸痛此邪氣初傳入里而未深入於裡故胸痛也古方用柴胡湯加枳殼治之如未應本方對小陷胸湯一服其效如神又風寒在肺胸滿癰氣喘宜用甘桔湯加理氣散風之劑又飲食填塞者宜用吐法首段系傷寒少陽經症即遵傷寒治法次段風邪在肺如嗽者加紫苑柴胡隆冬大寒加款冬花理氣以白蔻仁桑白皮力主散風以防風荊芥力主定喘加馬兜鈴末段飲食傷有風寒者應吐無風寒者三消散加檳榔桑白皮人有奔馳勞碌心緒急迫而胸痛者血也經曰血並於膈上熱中之症也宜元明粉檳榔花蕊石下泄其血詳見喻氏寓意草肋痛雜症肋痛左為肝氣不和用柴胡疏肝散七情鬱結用逍遙散若兼肝火痰飲食積淤血隨症加藥右為肝移邪子肺用推氣散凡治實症肋痛左用枳殼右用鬱金皆為的劑然亦有虛寒作痛得溫則散按之則止者又宜溫補不可拘執也此篇及後列三方大意已賅惟因怒而痛忌柴胡遵臨症指南加降香梔子石斛痛而有痰者加半夏白芥子血絡瘀痹者加桃仁歸鬚虛者大佐參術總不外此治左治右二方肋為少陽部位久痛無不口苦無他表症莫作外感治也胃脘痛胃脘病治法與心痛相仿但停食一症其脹痛連胸者吐之脹痛連腹者下之其食積之輕者則用神朮散消之又有胃脘膿症嘔而吐濃血者不得妄治韋云嘔家有膿不須治嘔膿儘自愈按臨症指南此篇以肝犯胃痛多其外則陽虛血瘀二症肝犯胃者口必酸或苦主以延胡索半夏川楝子陽虛者必嘔主以參附白朮大棗血瘀者大便必黑主以歸鬚桃仁此症屬熱者少忌芩連知柏氣壅者多亦忌黃耆胃脘痛除食積之外皆氣裹寒寒聚血凝也汪訒庵主以良薑香附後人加以薏米桃仁一和宗筋一化瘀血也其疼勢橫布者佐枳殼其疼勢直下者佐木香無不速效但良薑有毒總須米湯浸透蒸熟再用腹痛腹中痛其寒熱侖積氣血蟲盅辦法亦與心痛相符惟有肝未乘脾攪腸沙腹內痛茲三症有不同耳經云諸痛皆屬於肝肝木乘脾則腹痛仲景以芍藥甘草湯主之甘草味甘甘者己也芍藥味酸酸者甲也甲己化土則肝木平而腹痛止矣傷寒症中有由少陽傳入太陰而腹痛者柴胡湯加芍藥有因誤下傳入太陰而腹痛者桂枝湯加芍藥即同此意尋常腹痛全在寒熱食積分別詳明為主凡腹病乍作乍止脈洪有力熱也以芍藥甘草湯加黃連清之若噯腐吞酸飽悶膨脹腹中一條槓起者是食積也保和丸消之消之而痛不止便閉不行腹癰拒按者三黃枳朮丸下之設或下後仍痛以手按其腹若更痛者積未盡也仍用平藥再消之若按之痛止者積已去而中氣虛疼五味異功散樸之若消導攻下之後漸變寒中遂至惡冷喜熱須易溫中之劑此火痛兼食之治法也若腹癰綿綿不減脈遲無力者寒也香砂理中湯溫之若兼飽悶脹痛是有食積不便驟補香砂二陳湯加薑桂楂芽厚朴溫百消之消之而痛不止大便反閉名曰陰結以木香丸熱藥下之下後仍以溫劑和之此寒痛兼食之治法也若因聲氣壅塞走注疼痛木香調氣散散之若因瘀血積聚呆痛不移澤蘭湯行之蟲齧而痛唇有斑點飢時更甚化蟲丸消之傷暑霍亂四味香薷飲解之更有乾霍亂症欲吐不得吐欲瀉不得瀉變在須臾俗名攪腸沙是也更有遍體紫黑者名曰烏沙脹急用燒鹽和陰陽水吐之或用四陳湯服之外用武候平安散點左右大眼角其人即蘇其腹內癰一症當臍腫痛轉側作水聲小便如淋千金牡丹皮散化之古方治腹痛症多以寒者為虛熱者為實未盡然也蓋寒症亦有實痛者熱症亦有虛痛者如寒痛兼食則為實矣挾熱久痢則為虛矣凡看症之法寒熱虛實互相辨明斯無誤也此篇專指臍之上及繞臍而言足太陰脾經之病無積聚者只調本臟氣血有積食積血者須兼胃治篇中論治極詳後列各方皆先輩閱歷之言與臨症指甫大意皆合其傷暑霍亂攪腸沙及烏沙脹等病已列專門未詳者皆載臨症指南暑症篇可合參之更有天非炎熱而為穢濁阻氣者與受暑相等總以藿香厚朴為君其痛由左起者肝木犯脾隨症皆佐青皮香附痛在正中者宗筋病也佐薏仁木瓜痛偏於右者肺氣並阻也佐桑皮白蔻仁杏仁痛而小便閉者佐川椒澤瀉大便閉者後方自有通法不必復贅三黃枳朮丸消熱食除積滯腹痛拒按便閉溺赤名曰陽結宜用本方若冷食所傷宜用木香丸若冷熱互傷須酌其所食冷熱之多寡而並用之此東垣之法也黃芩一兩黃連五錢大黃七錢五分神麯白朮枳實陳皮各五錢荷葉一枚煎水疊為丸量虛突用腹痛症雖有實熱只在腸胃斷無心腎脾肺皆火之理大黃加山楂下之已為雜症中之猛藥矣豈可兼用芩連損陽敗胃耶況甘肅地氣較寒此方萬勿輕用木香丸治寒積冷食腹痛拒按或大便閉結謂之冷閉名曰陰結本方攻之木香丁香一錢五分乾薑三錢麥芽炒五錢陳皮三錢巴豆支殼炒黑三十粒神麯煮糊為丸每服十丸或二十丸開水下痛甚者倍之所食之物應隨利出如利不止以冷粥飲之即止古方中用巴豆多佐丁香或有相需之理已恐以火濟火腸胃腐爛豈可再加乾薑此方更不可輕用四陳湯除皮去白除香圓去穰陳枳殼去穰麵炒陳茶葉等分為末每服三錢開水點服此藥以藿香煎湯冷涼和服其效如神小腹痛尋常小腹癰多屬疝瘕奔豚之類書云男子外結七病女子帶下瘕聚古人更有痃癖癥瘕之名皆一類也痃如弓弦筋扛起也癖者隱闢沈附著骨也癥則有塊可徵猶積也多屬於血瘕者假也忽聚而忽散氣為之也奔豚者如江豚之上竄冷氣上衝也其癥瘕之氣聚子小腸則曰小腸氣聚於膀胱則曰膀胱氣也小腸氣矢氣則快膀胱氣少腹熱若沃以湯澀於小便也凡治少腹痛當用墜降之藥其行氣皆當用核乃能宣達病所以取效也橘核丸奔豚丸並主之此篇除傷寒厥明症外其雜症中之小腹痛不外癥瘕疝氣奔豚痃癖皆屬於寒惟淋症之小腹痛則屬於熱各有本門初治以藥攻病當遵臨症指南久則必虛攻病既動亦當參以補法可於景岳全書中求之橘核丸通治癥瘕痃癖小腸膀胱等氣橘核鹽酒炒二兩川楝子煨去肉山楂子炒香附薑汁浸炒各一兩五錢荔枝核煨研小茴香微炒各一兩神麯四兩煮糊為丸如桐子大每服三錢淡鹽水下寒甚加附子五錢肉桂三錢當歸一兩有熱加黑山梔七錢又疝氣症表寒束其內熱丹溪以黑山梔吳茱萸並用按此二味若寒熱不調者加入丸中更佳若胞痹小便不利去小茴加茯苓車前子丹參黑山梔癥瘕疝氣痃癖奔豚皆寒症也此方取用各核直達小腹深得氣味之理必曰寒甚始加桂附者蓋凡此數症下元既寒火逼肺胃者多故不敢列於原方之內此古人之苦心也經曰任脈為病男子內結七疝婦女帶下瘕聚肝經為病亦同吳萸龜版二味此方所不可少非吳萸不能驅肝寒非龜版不能通任脈也肉桂可量寒之輕重加之附子有上升之性不可用也便結陰虛者加熟地便溏氣虛者加何首烏身痛身體痛內傷外感均有之如身痛而拘急者外感風寒也身痛如受杖者中寒也身痛而重墜者濕也若勞力辛苦之人一身痠軟無力而痛者虛也治法風則散之香蘇散寒則溫之理中湯濕則燥之蒼白二陳湯虛則補之補中益氣湯大抵身痛多屬於寒蓋熱主流通寒主閉塞也無論風濕與虛挾寒者多挾熱者少治者審之傷寒太陽症重者身疼詳在各書重者麻黃湯輕者羌活桂枝中寒症之身疼指甲必青詳載醫門法律不外黑鉛丸理中湯二方其餘雜症即此風寒濕虛四者盡矣屬寒者多屬虛者尤多蓋氣虛則身重重極則痛也所列各方治風治濕時多加參術主要肩背臂膊痛肩臂痛古方主以茯苓丸謂痰飲為患也而亦有不盡然者凡背痛多屬於風胸痛多屬於氣氣滯則痰凝臟腑之病也背為諸腧之所伏凡風邪襲人必從腧入經絡之病也間有胸痛連背者氣閉其經也亦有背痛連胸者風鼓其氣也治胸痛者理痰氣治背癰者祛風邪此一定之理理痰氣宜用木香調氣散並前丸祛風邪宜用秦艽天麻湯挾寒者加附桂挾虛者以補中益氣加秦艽天麻主之如或風邪痰氣互相鼓煽痰飲隨風走入經絡而肩背腫湧則煎丸二方須酌量合用治無不效矣肩臂疼痛本書主以風痰二義後列二方以化痰驅風為主皆初入手時氣血尚盛時之治法也臨症指南此門列十餘方專以營衛為主用桂枝黃耆為君蓋桂枝行營氣生黃耆補衛氣也營衛流通諸痛自止初起先遵此書三五劑後當遵監症指南茯苓丸茯苓半夏薑汁炒各二兩風化硝枳殼麵炒各五錢薑汁糊丸如桐子大每服二三十丸淡薑湯下此方宜去風化硝加白朮膽南星秦艽無麻湯秦艽一錢五分天麻羌活陳皮當歸川芎各一錢炙甘草五分生薑三片桑枝酒炒二錢水煎服挾寒加附子桂枝此方應去羌活加桂枝生黃耆肺脈起於手大指為手六經之宗凡肩臂痛以肺為主明矣有困胃虛不能束筋者有因肝虛血不能榮筋者隨症佐治胃虛加白朮薏仁飴糖肝虛加天麻羚羊角如寒酌加桂萸更有兼虛者當詳考景岳全書腰痛腰湧有風有寒有濕有熱有瘀血有氣滯有疾飲皆標也腎虛其本也腰痛拘急牽引腿足脈浮弦者風也腰冷如冰喜得熱手熨脈沉遲或緊者寒也並用獨活湯主之腰痛如坐水中身體沉重腰間如帶重物脈濡細者濕也蒼白二陳湯加獨活主之若腰重疼痛腰間發熱痿軟無力脈弦數者濕熱也恐成痿症前方加黃柏主之若因閃挫跌撲瘀積於內轉側若刀錐之刺大便黑色脈澀或芤者瘀血也澤蘭湯主之走注刺痛忽聚忽散脈弦急者氣滯也橘核丸主之腰間腫按之濡軟不痛脈滑者痰也二陳湯加白朮萆薢白芥子竹瀝薑汁主之腰痛以脫重按稍止脈細弱無力者虛也六君子湯加杜仲續斷主之若兼陰冷更佐以八味丸大抵腰痛悉屬腎虛既挾邪氣必須祛邪如無外邪則惟樸腎而已然腎虛之中又須分辨寒熱二症如脈虛軟無力溺清便唐腰間冷痛此為陽虛須樸命門之火則用八味丸若脈細數無力便結溺赤虛火時炎此腎氣熱髓減骨枯恐成骨痿斯為陰虛須補先天之水則用六味丸合補陰丸之類不可誤用熱藥以灼其陰治者審之此篇所論義精法備與臨症指南景岳全書皆合所列腰冷如冰喜得熱手熨脈沉遲或緊者寒也此寒字乃外侵之寒非陽虛內寒也後列獨活湯風寒之偏輕偏重未甚分明蒼白二陳湯內無下部去濕之藥各於方下注之獨活湯治腎虛兼受風寒濕氣獨活桑寄生防風秦艽威靈仙牛膝茯苓各一錢桂心五分細辛甘草炙各三分當歸金毛狗脊各二錢生薑二片水煎服丹溪云久腰痛必用官桂開之方止寒甚者更加附子但有濕熱則二者皆不宜用風多寒少者去桂心細辛加虎骨寒多風少者去防風秦艽加鹿角霜骨碎補更加豬脊髓同煎方能取效蒼白二陳湯蒼朮白朮各一錢陳皮茯苓半夏薑汁炒甘草炙各一錢五分姜一片大棗二枚水煎服本方內無下部去濕之藥宜遵臨症指南加川萆薢蠶沙濕甚者酌加防已補陰丸治腎氣熱腰軟無力恐成骨痿熟地三兩丹皮天冬當歸枸杞子牛膝山藥女貞子茯苓龜版杜仲續斷各一兩二錢人參黃柏各五錢石斛四兩熬膏和煉蜜為丸每早淡鹽水下三錢既用黃柏不可再用龜版以傷元陽蓋腰疼無真實熱之症也濕熱亦偶有耳此丹溪心法原方景岳全書辨之甚明詳本草正龜版知母二條下痹鶴膝風痹者痛也風寒濕三氣雜至合而為痹也其風氣勝者為行痹遊走不定也寒氣勝者為痛痹筋骨攣痛也濕氣勝者為著痹浮腫重墜也然既日勝則受病有偏重矣治行痹者散風為主而以除寒祛濕佐之大抵參以補血之劑所謂治風先治血血行風自滅也治病痹者散寒為主而以疏風燥濕佐之大抵參以補火之劑所謂熱則流通寒則凝塞通則不痛痛則不通也治著痹者燥濕為主而以祛風散寒佐之大抵參以補脾之劑蓋土旺則能勝濕而氣足自無頑麻也通用蠲痹湯加減主之痛甚者佐以松枝酒痹症歷考各書皆以風寒濕為主病後列之方照病加減已得要領但痹為久病氣血必虛臨症指南及景岳全書皆以補法參佐詳載各書不能備錄大約營氣虛者身熱心煩宜佐人參桂枝歸身大棗衛氣虛者佐人參黃耆小茴香故紙胃虛便溏者佐白朮肉豆蔻茯苓澤瀉腰疼者佐熟地鹿茸杜仲宣補兼施方能奏效不可專用消散致成身寒多汗敗症也復有患痹日久腿足枯細膝頭腫大名曰鶴膝風此三陰本虧寒邪襲於經絡遂成斯症宜服虎骨膠丸外貼普救萬全膏則漸次可愈失此不治則成痼疾而為廢人矣鶴膝風之已成者風裹敗血聚於膝骨蓋骨之下藥力難到有善針者以艾火麝火針刺之無善針者照膝上兩穴以艾炙之瘀血潰膿用補劑調理方愈徒恃藥力奏功者少蠲痹湯通治風寒濕三氣合而成痹羌活行上力大獨活行下力專各一錢桂心五分秦艽一錢當歸三錢川芎治風先活血七分甘草炙五分桑枝三錢海風藤二錢乳香透明者木香止痛須理氣各八分水煎服風氣勝者更加秦艽防風寒氣勝者加附子濕氣勝者加防已萆薢苡仁痛在上者去獨活加荊芥痛在下者加牛膝間有濕熱者其人舌乾喜冷口渴溺赤腫處熱辣此寒久變熱也去肉桂加黃柏三分風氣勝者可增虎骨痛在下者宜去羌活虎骨膏丸治鶴膝風並治癱瘓諸症虎骨二斤銼碎洗淨用嫩桑枝金毛狗脊去毛白菊花去蒂各十兩秦艽二兩煎水熬虎骨成膠收起如蜜樣和藥為丸如不足量加煉蜜大熟地四兩當歸三兩牛膝山藥茯苓杜仲枸杞續斷桑寄生各二兩熟附子七錢厚肉桂去皮不見火五錢丹皮澤瀉八錢人參二兩貧者以黃耆四兩代之上為末以虎骨膠為丸每早開水下三錢如無全虎骨可加虎脛骨一對此方以追風和血為主不在溫補可去熟地附子加松節蘇木獨活痿痿大症也諸痿生於肺熱經云五臟因肺熱葉焦發為痿躄肺氣熱則皮毛先痿而為肺鳴心氣熱則脈痿脛縱不任地肝氣熱則筋痿口苦而經攣脾氣熱則肉痿肌膚不仁腎氣熱則骨痿腰脊不舉丹溪治法瀉南方補北方瀉南方則肺金不受刑補北方則心火自下降俾西方清肅之令下行庶肺氣轉清筋脈骨肉之間濕熱漸消而痿可愈也然經云治痿獨取陽明何也蓋陽明為臟腑之海主潤宗筋宗筋主束骨而利機關也陽明虛則宗筋縱帶脈不引故足痿不用也由前論之則曰五臟有熱由後論之則曰陽明之虛二說似異而實同蓋陽明胃屬濕土土虛而感濕熱之化則母病傳子肺金受傷而痿症作矣是以治痿獨取陽明也取陽明者所以祛其濕瀉南補北者所以清其熱治痿之法不外補中祛濕養陰清熱而已矣痿字從委言腿足不用如委棄肺熱葉焦者血不養筋也陽明空虛者宗筋不潤也合二義而參之其為筋病也明矣先生主濕立論只備一格且知母黃柏豈可加於久臥之人考臨症指南痿門所列二十餘方從肺熱濕熱者十中二三從肝腎虛損者十中七八蓋肝主筋腎主骨也舒筋如羚羊角杜仲息風如天麻女貞子此從乎肝者也壯骨如鹿茸鹿角骨碎補巴戟天從乎腎者也主以滋陰為本滋肺百合沙參滋胃飴糖玉竹氣虛佐參術血虛佐歸地不能定以成方也五痿湯治五臟痿人參白朮茯苓各一錢甘草炙四分當歸一錢五分苡仁三錢麥冬二錢黃柏炒褐色知母各五分水煎服心氣熱加黃連三分丹參生地各一錢肝氣熱加黃芩丹皮牛膝各一錢脾氣熱加連翹一錢生地一錢五分腎氣熱加生地牛膝石斛各一錢五分肺氣熱加天冬百合各二錢挾痰加川貝竹瀝濕痰加半夏曲瘀血加桃仁紅花如氣血兩虛另用十全大補湯腎肝虛熱髓減骨枯兼用虎潛丸主之此方去黃柏知母加地骨皮澤瀉仍合清熱利濕之旨而無滅火絕陽之患斯力全璧仍照所列加減法虛潛丸龜版四兩杜仲熟地各三兩黃柏炒褐色知母各五錢牛膝白芍藥虎骨酒炙酥當歸各二兩陳皮四錢乾薑二錢為末酒糊丸每服二錢淡鹽水下加人參一兩尤妙此方去知母黃柏加牛腿骨髓骨碎補以治骨痿曾見奏效腳氣腳氣者腳下腫痛即痹症之類也因其痛專在腳故以腳氣名之其腫者名濕腳氣不腫者名乾腳氣濕腳氣水氣勝也檳榔散主之乾腳氣風氣勝也四物湯加牛膝木瓜主之腳氣一症屬風者少屬濕者多屬風者於檳榔散中加桂枝川椒可愈屬濕者必須先用補中歸脾等藥留其濕在中焦而後以五苓加川椒利之方為合法不可徒用墜藥因下愈墜而愈腫也用濕相搏者散風藥中加蒼朮澤瀉濕氣重者以艾葉蒼朮川椒枯礬為粗末隔布包腳取效甚速癘風癘風癩也俗稱大麻風濕熱在內而為風鼓之則肌肉生蟲白屑重疊搔癢頑麻甚則眉毛脫落鼻柱崩壞事不可為矣治法清濕熱祛風邪以苦參湯地黃酒並主之外以當歸膏塗之往往取效未可據視為廢疾而忽之也凡此毒症內服之藥功居半外塗之藥功居半且非毒不能攻毒輕描淡寫無益也各參鄙見注於後方之下苦參湯苦參一錢五分生地二錢黃柏五分當歸秦艽牛蒡子赤芍白蒺藜丹參丹皮銀花貝母各一錢甘菊三錢水煎服此方內應加防風五分蒼朮一錢酒炙大黃五六分合防風通聖散意內外兩解方合治法蓋胃主肌肉胃無濁液肌肉安得腐爛非大黃不能利之也加味當歸膏治一切瘡疹並癰腫收口皆效當歸生地各一兩紫草木別子肉去殼麻黃大楓子肉去殼研防風黃柏元參各五錢麻油八兩黃臘二兩先將前九味入油熬枯濾去渣再將油復入鍋內熬至滴水成珠再下黃臘試水中不散為度傾入蓋碗內坐水中出火三日聽搽未破之前應用此膏既破之後則藥膏毒水兩不相入可去黃臘麻油加銅綠枯礬輕粉改為藥面拔出毒水方能結痂噎嗝古方治噎嗝多以止吐之劑通用不思吐濕症也宜燥噎嗝燥症也宜潤經云三陽結謂之隔結結熱也熱甚則物乾凡噎隔症不出胃脘乾槁四字槁在上脘者水飲可行食物難入槁在下脘者食雖可入久而復出夫胃既槁矣而復以燥藥投之不愈益其燥乎是以大小半夏二湯在噎嗝門為禁劑子嘗用啟膈散開關更佐以四君子湯調理脾胃挾郁者則用逍遙散主之雖然藥逍遙而人不逍遙亦無益也張雞峰云此症乃神思間病總當內觀靜養斯言深中病情然其間有挾蟲挾血挾痰與食而為患者皆當按法兼治不可忽也三陽者足陽明胃手陽明大腸手太陽小腸也火結三陽津液乾枯故大便燥結食入即吐甚者食不能入矣醫門法律專主清涼滋潤深合經旨景岳全書兼用補法雖與經旨不合然實有胃氣將絕者非參莫挽加入清涼滋潤和血藥內可也若參耆術則斷無用理臨症指南列十餘方大意皆遵喻氏和血潤燥之旨惟後列附子丁香等方皆治反胃之藥與此門無干也余在南方見前輩於和血潤清火解鬱藥中加蜣螂攻大腸之干糞用泥蝤通小腸之道路十中可愈二三至於用藥潤燥則麥冬天冬紫石英梨汁藕汁蔗汁牛乳麻仁和血則桃仁歸尾赤芍化痰則竹瀝牛黃順氣則山楂橘紅用柔不用剛用潤不用燥而已食不入者開賁門多用杏仁食入即吐者開幽門多加桃仁斟酌輕重施治格咽之與反胃病雖相似其病源則有霄壤之別蓋反胃之因有三輕者肝經陰邪犯胃主以代赭旋覆湯加吳茱萸重者幽門努肉瘀血翻騰遵古法用虎肚以蝕去之再重者胃陽虛也用理中法加粳米飴糖或曰何以別之蓋格咽症面必黎黑反胃症則或青或黃格咽症大便始終於結攻之不軟反胃症則或結或清一攻即瀉格咽胃脈必堅搏反胃則浮大或微弱也痢疾古人治痢多用墜下之品如檳榔枳實厚朴大黃之屬所謂通因通用法非不善矣然而效者半不效者半其不效者每至纏綿難愈或嘔逆不食而成敗症者比比皆是予為此症仔細揣摩不捨置忽見燭光遂恍然有得因思火性炎上者也何以降下於腸間而為痢良由積熱在中或為外感風寒所閉成為飲食生冷所遏以致火氣不得舒伸逼迫於下裡急而後重也醫者不察更用檳榔等藥下墜之則降者愈降而痢愈甚矣予因制治痢散以治痢症初起之時方用葛根為君鼓舞胃氣上行也陳茶苦參為臣清濕熱也麥牙山楂為佐消宿食也赤芍藥廣陳皮為使所謂行血則便膿自愈調氣則後重自除也製藥普送效者極多惟於腹中脹痛不可手按者此有宿食更佐以樸黃丸下之若日久脾虛食少痢多者五味異功散加白芍黃連木香清而補之氣虛下陷者補中益氣湯升提之若邪熱穢氣塞於胃脘嘔逆不食者開噤散以啟之若久痢變為虛寒四肢厥冷脈微細飲食不消者附子理中湯加桂溫之夫久痢必傷腎不為溫暖元陽誤事者眾矣可不慎與痢疾古方甚多用之效與不效參半先生髮表之論開前賢所未發與醫門法律大旨相合法律主以柴胡升舉少陽後指邪氣久陷者而言若治初起不若葛根之直捷也至於暑濕風火寒熱輕重氣分血分之分別當照臨症指南用藥之法參入後方之內暑濕相兼者薑連藿香並用在氣分者多脹悶厚朴木香由主在血分者小腹痛甚便帶血積芍藥沒藥乳香為主小便閉者多用滑石微佐車前澤瀉下寒者佐溫法肉桂厚朴並行氣虛者佐補法人參木香並施久痢陽虛者悉從溫補景岳胃關煎及補脾補中八味右歸各方隨人施治若虛滑已極訶黎勒肉豆蔻所不能止者必須遵桃花湯意用赤石脂矣後列各方及景岳全書各方參以臨症指南兼寒兼熱臨時斟酌治痢散專治痢疾初起之時不論赤白皆效葛根苦參酒炒陳皮陳松蘿茶各一斤赤芍酒炒麥芽炒山楂炒各十二兩上為細末每服四錢水煎連藥末服下小兒減半忌葷腥麵食煎炒閉氣發氣諸物本方加川連四兩尤效此藥宜用鮮薑湯下方得寒熱調濟之妙補黃丸治痢疾初起腹中實痛不得手按此有宿食也宜下之陳皮厚朴薑汁炒各十二兩大黃酒蒸一斤四商廣木香四兩荷葉水疊為丸如綠豆大每服三錢開水下小兒一錢此南方濕熱之處急攻熱毒之藥與西北地氣寒冷者不宜可以山楂黃芩二味代之開噤散治嘔這食不入書云食不得入是有火也故用黃連痢而不食則氣益虛故加人參虛人久痢並用此法人參川黃連姜水炒各五分石菖蒲不見鐵七分丹參三錢石蓮子去殼即建蓮中有黑殼者茯苓陳皮各一錢陳米一撮冬瓜仁去殼一錢五分荷葉蒂二個水煎服方中之石蓮子並非建蓮中有黑殼者系另一種色極黑質極堅味極苦者是也泄瀉書云濕多成五瀉瀉之屬濕也明矣然有濕熱有濕寒有食積有脾虛有腎虛皆能致瀉宜分而治之假如口渴溺赤下瀉腸垢濕熱也溺清口和下瀉清穀濕寒也胸滿痞悶噯腐吞酸瀉下臭穢食積也食少便頻面色㿠白脾虛也治瀉神朮散主之寒熱食積隨症加藥脾虛者香砂六君子湯腎虛者加減七神丸凡治瀉須利小便然有食積未消者正不宜利小便必俟食積既消然後利之斯為合法凡瀉皆脾經症治之之要有三曰舒散曰調達曰溫固而已舒散者主在暑濕香薷藿香是也調達者主在時行不正之氣藿香梗蘇梗是也溫固者主在脾虛白朮菟絲是也真脾虛者又必須補火以助土故紙杜仲胡桃肉是也久瀉者脾虛胃虛中氣必陷補中益氣湯去柴胡加澤瀉訶黎勒肉豆蔻應手奏效更有肝脾兩虛心脾兩虛腎脾兩虛及肝邪犯胃各症實在夾熱實在積聚者不過十中之一二耳所列各方對症者加減酌用未備者在臨症指南案中求之瘧疾瘧者暴瘧之狀因形而得名也經曰陰陽相搏而瘧作矣陰搏陽而為寒陽搏陰而為熱如二人交爭此勝則彼負彼勝則此負陰陽互相勝負故寒熱並作也善治瘧者調其陰陽平其爭勝察其相兼之症而用藥得宜應手可愈大法瘧疾初起香蘇散散之隨用加減小柴胡湯和之二三發後止瘧丹截之久瘧脾虛六君子湯加柴胡補之中氣下陷補中益氣湯舉之元氣既回瘧症自止書云一日一發者其病淺兩日一發者其病深三日一發者其病尤深然而寒熱往來總在少陽久而不愈總不離乎脾胃蓋胃虛亦惡寒脾虛亦發熱也疏理少陽扶助脾胃治瘧無餘蘊矣瘧症寒熱往來不離少陽醫門法律論之甚詳邵新甫注臨症指南乃神而明之之言初學者其可舍有定之津梁而望海茫茫也惟此篇名目未分須遵各書表而出之熱而無寒者癉瘧也主以知母花粉竹葉麥冬重者加石膏更遵本草綱目用豌豆苗古方稱為翹搖者也立見神效心煩溺赤熱多寒少多暈目昏六月以前得者溫瘧也主以連翹竹葉桑葉花粉黃芩女貞盛暑而發者暴瘧也照溫瘧法多用竹葉荷葉香薷加西瓜水同煎更效舌白身重四肢寒者濕瘧也主以草果厚朴甚者用蒼朮肝脾肺腎不和皆能為瘧雖不離手少陽而有某經之症須加某經之藥無論燥濕寒熱必佐利痰熱痰用竹瀝濕痰用半夏補虛用參術而不用黃耆驅寒用薑桂而不用附子消積用山楂而不用大黃總不可輕用常山截止使邪氣內攻也止瘧丹治瘧症二三發後以此止之應手取效常山火酒炒草果仁去殼半夏曲薑汁炒香附米酒炒青皮去穰醋炒各四兩真六神麯十二兩為末用米飲煮糊為丸如彈子大硃砂為衣輕者一丸重者二丸紅棗五六枚煎湯化下清晨面東空腹服此法非十餘發後斷斷不可輕用嘗見邪氣內攻壞在頃刻也論水腫鼓脹問曰水腫鼓脹何以別之答曰目窠與足先腫後腹大者水也先腹大後四肢腫者脹也然水腫亦有兼脹者脹亦有兼水者須按其先後多寡而治之今分為兩門治者宜合參焉水鼓氣鼓臨症指南列為一門蓋因水腫由濕而得脾陽虛弱土不制水原有不兼氣者而氣鼓則中焦郁遏脾胃失其燥消之職未有不聚水者此外血蠱蟲蠱皆致腫脹分之不止兩門合之只是一腫就症論症不必斤斤分門別類也水腫水腫症有表里寒熱腎胃之分大抵四肢腫腹不腫者表也四肢腫腹亦腫者里也煩渴口燥溺赤便閉飲食喜涼此屬陽水熱也不煩渴大便自調飲食喜熱此屬陰水寒也先喘而後腫者腎經聚水也先腫而後喘或但腫而不喘者胃經蓄水也經云腎者胃之關也失閉則水積然胃病而關亦自閉矣治胃者五皮飲加減主之治腎者腎氣丸加減主之或問書云先喘後腫其病在肺何也答曰喘雖腫病其本在腎經云諸痿喘嘔皆屬於下是也若外感致喘或專屬肺經受邪內傷致喘未有不由於腎者治者詳之考臨症指南用藥之法理脾理腎理肝皆用溫補利胃利腸利膀胱皆用清泄臟無不寒腑無不熱二語盡之矣腎陽虛而後脾土敗土不制水浸入脈絡而後腫作亦有因肝經濁陰犯脾脾陽因之而敗者來路雖分兩條成病統歸於脾宜以白朮為君藥因腎虛者必腰疼佐以肉桂由肝逆者必口酸口昔佐以吳茱萸此治臟之大法也治腑之法胃宜厚朴桃仁小腸宜木通椒目膀胱亦豬苓澤瀉腎虛者佐巴戟天淫羊藿肝逆者佐木瓜白芍此治腑之大法也總用川楝子延胡索引陽藥以入陰絡方能見效後列之五皮飲初用甚效及腫消一半之後用之無功蓋皮只行皮僅消皮裡膜外之水不能直達深處必欲求愈用前數法十餘劑後須用本草綱目中雞屎蝦蟆葡萄須各古方乃能攻去病根患此症者腹內皆有極黑極黏之物黏著腸胃乃作腫之根嘗見將愈之時此物從大便出健脾和胃調理而愈水症項筋必動若氣粗或喘乃水入肺管宜用蘇子葶藶瀉肺之品勿作氣虛看也五皮飲治胃經聚水乃通用之劑華佗中藏經之方也累用累驗大腹皮黑豆汁洗茯苓皮陳皮桑白皮各一錢五分生薑皮八分水煎服仲景云腰以上腫宜發汗加紫蘇秦艽荊芥防風腰以下腫宜利小便加赤小豆赤茯苓澤瀉車前子萆薢防己若大便不通宜下之加大黃葶藶腹中脹滿加蘿蔔子厚朴陳皮麥芽山楂體虛者加白朮人參茯苓審是陰水加附子乾薑肉桂審是陽水加連翹黃柏黃芩挾痰者加半夏生薑既消之後宜用理中湯健脾實胃或以金匱丸溫暖命門或以六味加牛膝車前滋腎水清餘熱庶收全功有聚得水腫四肢腫痛甚至頭面腫痛者乃水風發黃宜五皮飲加海桐皮白蘚皮五加皮赤小豆車前等類一汗而愈金匱腎氣丸治腎經聚水小便不利腹脹肢腫或痰喘氣急漸成水蠱其效如神然腎經聚水亦有陰陽之分不可不辨也經云陰無陽無以生陽無陰無以化經又云膀胱者州都之官津液藏焉氣化則能出矣假如腎經陽虛陰無以生真火不能制水者亦用此丸假如腎經陰虛陽無以化真陰不能化氣者宜用本方去附桂主之東垣云土在雨中化力泥陰水之象也河間云夏熱之甚庶土蒸溽陽水之象也知斯意者可以治水矣大熟地八兩山藥四兩山萸肉丹皮澤瀉車前子牛膝各二兩茯苓六兩肉桂一兩附子一兩虛寒甚者倍之用五加皮八兩煮水一大碗濾去渣和藥加煉蜜為九如桐子大每早開水下四錢前症若屬陰虛本方去桂附加文蛤牡蠣各二兩濕熱甚者加黃柏五錢不用五加皮以萆薢八兩熬汁代之用腎氣丸即溫臟利腑之意故用之往往見效但水腫乃陰絡閉塞宜用陽剛之藥熟地至陰至膩最能閉絡與此症大不相宜試觀臨症指南此篇共列八十餘方並無一方用地黃者可以知用藥之法矣其屬實在陰虛者不妨以枸杞沙苑代之所列加用黃柏之法亦指病之初起而言膀胱不通蒸為蘊熱不得不清滑石佐黃柏最良後引東垣河間二說其意深遠驟難領會君子於所不知益闕如也論血分水分婦人經水先斷後發腫者名曰血分通經丸主之先發水腫然後經斷者名曰水分五皮飲送下通經丸主之先水腫而後斷經者多由水入子臟本草綱目禽部內所列雞矢醴牽牛酒二方極為對症蓋雞屎乃子臟之引藥治水之猛劑也遇信醫不疑之家可以試之通經丸當歸尾赤芍藥生地黃川芎牛膝五靈脂各一兩紅花桃仁各五錢香附二兩琥珀七錢五分蘇木屑二兩煎酒和砂糖熬化為丸如桐子大每服三錢酒下體虛者用理中湯送下若血寒加肉桂五錢通經丸方內少茜草鼠糞二味不能直透衝脈宜加之五靈脂過破肝血慎用鼓脹或問方書有鼓脹蠱脹之別何也答曰鼓者中空無物有似於鼓蠱者中實有物非蟲即血也中空無物填實則消經所謂塞固塞用是也中實有物消之則平經所謂堅者消之是也然脹滿有寒熱虛實淺深部位之下同若不細辨何由取效假如溺赤便閉脈數有力色紫黑氣粗厲口渴飲冷唇焦舌燥多屬於熱假如溺清便溏脈細無力面色㿠白氣短促喜飲熱湯舌潤口和多屬於寒又如腹脹按之不痛或時脹時減者為虛按之愈痛腹脹不減者為實凡脹滿飲食如常者其病淺飲食減少者其病深且脹有部分縱是通腹脹滿亦必有脹甚之部與病先起處即可知屬何臟腑而用藥必以之為主東垣治脹滿不外枳朮補中二方出入加減寒熱攻補隨症施治予因制和中丸普送效者甚多有力者當修合以濟貧乏又氣虛中滿宜用白朮丸而以六君子湯佐之中空無物不用枳實恐傷氣也此所謂鼓脹係指有氣無水者而言其因有二一為氣血不相融合氣孤行而作脹法當用補氣藥加丹參須當歸鬚川楝子引氣入血絡其脹自止健中湯加參術及前三味脹甚者少加宣行之藥破氣之藥至厚朴木香而止萬不可用三稜莪朮補氣之藥至人參而止萬不可用黃耆一由少陽之氣不升郁遏於下而作脹滿所列和中丸意加柴胡青蒿必愈南方春梅花得少陽之氣最先用治此症大有奇功所列寒熱二條不可不分不可過分總是臟寒腑熱先熱後寒腑熱宜清利臟寒宜溫宣所列虛實之分亦不可拘泥總是先實後虛凡此等症不得不補瀉兼施必須補多於瀉方能保留性命況瀉後再補何如少瀉所列脹有部分總是通腹脹滿亦有脹甚之部與病先起處認病之法甚得要領後篇積聚門和中丸下按經加藥之法可遵血蠱蟲蠱醫宗金鑑自有專門茲不復贅三黃枳朮丸治熱食所傷肚腹脹痛並濕熱脹滿大便閉結者黃芩酒炒一兩黃連酒炒四錢大黃酒蒸七錢五分神麯炒枳實麵炒白朮陳土炒陳皮各五錢荷葉煎水疊為丸如綠豆大每服一錢五分或二三錢量人虛實用本門中偶有不得不下之症故此法不得不存以備一格然用大黃推積滯則可用芩連復傷胃陽則不可必不得已而用之京城劉燏丹山楂丸較妥積聚積者推之不移成於五臟多屬血病聚者推之則移成於六腑多屬氣病既曰積聚必有物焉斷非虛氣若只虛氣仍是氣鼓也但當認氣中有物不可直指為氣病一味消耗治積聚者當按初中末之三法焉邪氣初客積聚未堅宜直消之而後和之若積聚日久邪盛正虛法從中治須以補瀉相兼為用若塊消及半便以末治即住攻擊之藥但和中養胃導達經脈俾榮衛流通而塊自消矣更有虛人患積者必先補其虛理其脾增其飲食然後用藥攻其積斯為善治此先補後攻之法也初治太無神功散主之中治和中丸主之末治理中湯主之予嘗以此三法互相為用往往有功篇中所分初中末三法至精至當導達經脈調理脾胃二法深合經旨但後列之方尚未全備此門各書議論不一景岳主補斷不有遵惟東垣十書內巴豆法最善巴豆雖有大毒削堅之力甚猛用後即飲黑豆湯速解其毒使無傷脾胃仍應詢問病人得病之初因食某物而得即用某物燒灰加入丸內每有奇效本草綱目中古方甚多皆可擇用和中丸白朮陳土炒四兩扁豆炒三兩伏苓一兩五錢枳實麵炒二兩陳皮三兩神麯炒黑麥穿炒山楂炒香附薑汁炒二兩砂仁一兩五錢半夏薑汁炒一兩丹參酒蒸二兩五穀蟲酒拌炒焦黃色三兩荷葉一枚煎水疊為丸每日上午下午開水下二錢此方不寒不熱和平之治法也書云肝之積在左肋下名曰肥氣加柴胡龜甲青皮莪朮肺之積在右肋下名曰息賁加自蔻仁桑白皮鬱金心之積起臍上上至心下大如臂名曰伏梁加石菖蒲厚朴紅花莪朮脾之積在胃脘腹大如盤名曰痞氣加厚朴腎之積在臍下發於小腹上衝心而痛名曰奔豚另用奔豚丸主之熱積加黃連黃芩寒積加肉桂乾薑附子酒積加葛根痰積加半夏水積加桑白皮赤小豆血積加桃仁紅花乾漆肉積加阿魏山楂按部認痛按經用藥之法甚善不但積聚氣鼓一門一切疝氣癥瘕等症無不當遵宜細細問明部位為要如系男子之病用手親揣更無錯誤奔豚丸川楝子煨去肉一兩茯苓桔子鹽酒炒各一兩五錢肉桂三錢附子炮吳茱萸湯泡七次各五錢荔枝子煨八錢小茴香木香各七錢熬砂糖為丸每服二錢淡鹽湯下若有熱者去附桂此方用藥簡淨不止專治奔豚凡疝氣癥瘕一切下元寒冷之症皆宜惟非極寒不可輕用附子方內少沉香牛膝二味不能達會陰穴但非中氣極虛之人可酌加之又方內少陰分藥初服恐其發燒及便結煩渴雖不宜用熟地枸杞沙苑子巴戟天可酌加之奔豚者即寒瘕上衝之症皆屬肝腎虛寒而滯者非奇病大病暖而宣之即開疝氣疝者少腹痛引睪丸也經云任脈為病男子外結七疝女子帶下瘕聚七疝者一曰沖病氣上衝心二便不通也二曰狐疝臥則入腹立則出腹也三日㿗疝陰囊腫大如升如斗也四曰厥疝肝氣上逆也五曰瘕疝腹有癥痞痛而熱時下白濁也六曰㿉疝內裹膿血也七曰㿉癃疝內裹膿血小便不通也愚按厥疝即沖疝㿉癃疝即㿉疝其名有七其實五者而已病之根起於各臟而歸併總在厥陰以肝主筋又主痛也治疝之法非一而分別不外氣血氣則遊走不定血則凝聚不散也橘核丸加減主之按素問骨空論任脈為病男子內結七疝女子帶下瘕聚本書以內為外顯系刊誤此篇所分七疝及用藥之法至簡至當後列丸方亦極精慎分兩中君臣未分另注方下其未敢驟列桂萸者以此症肝腎任脈雖寒而下焦之火逼入小腸膀胱多現浮熱故也並非違悖古法觀臨症指南篇中有梔子蘆薈二方可知疝氣亦多臟寒腑熱也寒為本熱為標熱在先寒在後方合仲景立法之旨鄒滋九論中九疝屬熱一語不但違悖仲景且大非葉氏立方之意也此症非橘核荔枝核重墜等藥不能引熱藥以達病所然患此症者陽氣未衰中氣多虛溫暖重墜之藥只可為丸不可用湯恐其牽動中氣也服丸藥四五次後必須夾服補中益氣歸脾等湯一劑以保中氣且已墜之脈絡墜之一升方能奏效橘核丸通治七疝橘核鹽酒炒二兩小茴香川楝子煨去肉桃仁去皮尖及雙仁者炒香附醋炒山楂子炒各一兩廣木香紅花各五錢以神麯三兩打糊為丸每服三錢沖疝用白茯苓一錢松子仁三錢煎湯送下狐疝用當歸二錢牛膝一錢五分煎酒送下㿗疝用白茯苓陳皮赤茯苓各一錢煎湯送下厥疝治同沖疝瘕疝用丹參白茯苓各一錢五分煎湯送下㿉疝本方內加五靈脂一兩醋炒赤芍一兩五錢酒炒服時用牛膝一錢五分當歸尾三錢煎酒送下㿉癃疝治法同上此症苦寒氣深重本方內加吳茱萸內桂心各五錢甚則加附子一枚若表寒束其內熱腹痛熱辣或流白濁者本方內加黑山梔五錢川萆薢一兩吳茱萸三錢湯泡七次吳萸散表寒山梔清內熱二者並行丹溪心法也照此方定分數小茴香當用四兩以合古法加龜版五錢以透任脈既用桃仁可去紅花小腸氣者臍下轉癰矢氣則快照前篇奔豚丸加木通沉香為丸兼用湯藥補劑膀胱氣者臍熱癰澀於小便即胞痹也照前篇奔豚丸意加豬苓澤瀉滑石桃仁痃者狀如弓弦筋病也照前篇奔豚丸意加鱉甲青皮鉤藤蔥管為丸去附子癬者隱伏於內疼痛著骨也此條如系婦人即是症病之重者如系小兒在疳癬門中如系男子就症論症大約丸藥宜暖宜消宜化湯藥宜調補脾胃痰飲凡病未有不發熱不生痰者是痰與熱乃雜病兼見之症似無客專立法門矣然亦有雜病輕而痰飲重則專以痰飲為主治內寒外寒內熱外熱皆能生痰但當曰無病不生痰不可加熱字混之又專以痰飲為主治句專字擬改為兼字似較妥書有五痰之名以五臟分主之也五飲之名隨症見也其實猶未確當大抵痰以燥濕為分飲以表裡為別濕痰滑而易出多生於脾脾實則消之二陳湯甚則滾痰丸脾虛則補之六君子湯兼寒兼熱隨症加藥燥痰澀而難出多生於肺肺燥則潤之貝母瓜蔞散肺受火刑不能下降以致真水上泛則滋其陰六味丸飲有在表者乾嘔發熱而咳面目四肢浮腫香蘇五皮散飲有在裡者或停心下或伏兩腋咳則相飲而痛或走腸間轆轆有聲用小半夏加茯苓湯隨其部位而分治之此治痰飲之大法也書云治痰須理脾以痰屬濕脾土旺則能勝濕耳治痰如此飲亦宜然然脾經痰飲當健脾以祛其濕若腎虛水泛為痰為飲者必滋其腎腎水不足則用六味若命門真火衰微寒痰上泛者則用八味腎氣丸補火生土開胃家之關導泉水下流而痰飲自消矣古法痰飲皆為一門飲者水也脾胃失職飲聚為痰也臨症指南分為兩篇痰為一門痰飲為一門後學始得認病之法此篇題目遵古渾列篇中分析詳明論病曉暢列方亦合古法誠初學之津梁也再參以臨症指南中二篇可得大要矣痰因病生病燥則痰燥病濕則痰濕寒病生寒痰熱病生熱痰因風者痰中有風因火者痰中夾火七情六淫之病皆能使津液凝聚而為痰不專指肺胃二經肺胃乃其聚處也七情之病為內傷但治其病則痰自消六淫之邪為外感兼治其痰而病亦去即如風痰一症風在痰中一豁其痰風亦隨之去矣余可類推篇中方法未備宜參合各書理脾胃宜遵東垣補虛損亦遵景岳詳究病源宜讀醫門法律大論變症百出隨機施治宜熟記臨症指南用藥之法總不外痰因病生一語也治痰飲之法當參以水腫嘔逆濕症脾虛等門而加以豁痰之藥與治痰不甚相同醫門法律支飲論獨得妙義當細究之滾痰丸治實熱老痰變生怪症大黃蒸片刻黃芩炒各四兩青礞石硝煅金色沉香細銼各三錢辰砂細研水飛二錢水疊為丸辰砂為衣每服一二錢開水下此物但取痰積並不刮腸大瀉為老痰要藥青礞石煅制如法誠為治痰要品嘗見前輩治一寒痰飲食不進者數日姜附六君子湯中加入一錢其痰豁然吐出如墨如黛飲食遂進用參朮調理脾胃而愈又見治一傷風症表邪未退人已昏迷痰聲如拽鋸桂枝湯中加入二錢痰墜汗亦隨出誠不可少之藥然原方味太猛烈日擊壞事者多矣不可輕用不得已而用之須與大劑參朮湯藥間服嘔吐噦呃逆嘔者聲與物俱出吐者有物無聲噦者有聲無物世俗謂之乾嘔東垣以此三者皆因脾胃虛弱或寒氣所客或飲食所傷以致氣逆而食不得下也香砂二陳湯主之然嘔吐多有屬火者經云食不得入是有火也食入反出是有寒也若拒格飲食點滴不入者必用姜水炒黃連以開之累用累效至於食入反出固為有寒若大便閉結須加血藥以潤之潤之不去宜蜜煎導而通之蓋下竅開上竅即入也其有脾胃虛弱而吐者補中為主理中湯其有因痞積滯礙而吐者消積為主和中丸若命門火衰不能生土者補火為主八味丸嘔吐二字似不可分蓋臨吐未有不嘔者若無聲脫然而出是胃陽已敗多不治之症矣噦為有聲無物有因腎虛肺氣上逆者補腎藥中加沉香磁石有因小腸之氣不降者平胃藥中加木通桃仁有因肝氣上逆沖胃者平胃藥中加青皮白芍非專治脾胃所能愈也篇中補火生上之論有合古法其餘系東垣一家之言與臨症指南不合觀臨症指南篇中一主於肝有肝火犯胃肝寒犯胃肝腎兩虛衝脈上逆犯胃諸方不外辛散苦泄酸斂鎮墜等法辛散多用吳萸淡姜苦泄多用黃連楝子酸斂則烏梅木瓜鎮墜則旋覆赭石蓋非葉氏一家之言實遵內經之旨也復有呃逆之症氣自臍下直衝上多因痰飲所致或氣鬱所發扁鵲丁香散主之若火氣上衝橘皮竹茹湯主之至於大病中見呃逆者是謂土敗木賊為胃絕多難治也呃逆之氣起自臍下屬肝腎兩經不固病在丹田溫下藥中加沉香起自腰脊者病在腎與腎脈溫下藥中加鹿角霜皆應用丸藥而以白蔻仁甜杏仁等藥煎湯送下理中湯乾薑炙甘草各一錢人參二錢白朮二錢陽虛胃寒之症可用胃氣將敗者加丁香亦無妨和中丸白朮陳土炒四兩扁豆炒三兩茯苓一兩五錢枳實麵炒二兩陳皮三兩神麯炒黑麥芽炒山楂炒香附薑汁炒二兩砂仁一兩五錢半夏薑汁炒一兩丹參酒蒸二兩五穀蟲酒拌炒焦黃色三兩此方攻多補少且藥味過燥用治積聚則可與嘔吐症不甚相宜八味丸大熟地四兩山萸肉去核山藥各二兩丹皮茯苓澤瀉各一兩五錢肉桂熟附子各五錢大便乾小便利者去澤瀉加懷牛膝扁鵲丁香散丁香五個柿蒂五個甘草炙五分乾薑一錢此方主傷寒販逆胃氣將敗之症與雜症呃逆全不相涉橘皮竹茹湯陳皮去白二錢竹茹一團半夏人參甘草各一錢一方加麥冬赤茯苓薑棗三消經云渴而多飲為上消消穀善飢為中消口渴小水如膏者為下消三消之症皆燥熱結聚也大法治上消者宜潤其肺兼清其胃二冬湯主之治中消者宜清其胃兼滋其腎生地八物湯主之治下消者宜滋其腎兼補其肺地黃湯生脈散並主之夫上消清胃者使胃火不得傷肺也中消滋腎者使相火不得攻胃也下消清肺者滋上源以生水也三消之治不必專執本經而滋其化源則病易痊矣書又云飲一溲一或飲一溲二病勢危急仲景用八味丸主之所以安固腎氣也而河間則用黃耆湯和平之劑大抵肺腎虛而不寒者直用此法上消屬肺燥胃枯其病在肺胃其本在腎因腎水乾涸火不守位而上騰治法上當用二冬花粉梨汁蔗汁文蛤甚者石膏黃芩煎湯頻飲以救燎原之勢下當用熟地枸杞磁石肉桂牛膝引火歸元以治本詳醫門法律大淪闡發仲景妙義水得火則溫氣上升如蒸酒然云騰致雨如露如珠者自華蓋而下灑布於肺則津液生而渴止矣此法當用丸藥二法輪流間服不可偏廢偏廢必死中消者渴而兼消穀非專指消穀也其病在胃其本在心脾更當求之中焦氣分蓋中焦之氣發於心脾故景岳玉女煎取用石膏臨症指南取用犀角其治氣分也明矣石斛玉竹在所必需梨藕蔗汁亦不可少切忌參耆桂附又忌檳砂枳樸下消者熱在膀胱其本在腎腎之本又在肺宜兼滋之所謂壯水之主以制陽光是也此症多中氣不攝丹溪黃耆湯可取但須多加花粉以生津液腎為膀胱之本當牢固腎關如龍骨牡蠣鹿茸骨碎補加入大劑熟地枸杞藥內引以童便庶乎有濟忌一切利水之藥亦不可用韭子鎖陽收縮之劑又按仲景少陰篇云腎經虛必頻飲熱湯以自救乃同氣相求之理今腎經虛寒則引水自灌虛寒不能約制故小便頻數似此不必與消症同論宜用理中湯加益智仁主之按此即仲景金匱腎氣丸症也不可改用理中湯傷耗胃陰二冬湯治上消天冬去心二錢麥冬去心三錢花粉一錢黃芩一錢知母一錢甘草五分人參五分荷葉一錢水煎服此方應去知母加柿霜新蜜及梨藕蔗汁等類生地八物湯治中消生地三錢山藥一錢五分知母一錢五分麥冬三錢黃芩一錢黃連一錢黃柏一錢丹皮一錢五分荷葉二錢水煎服此方應去知母黃柏加石斛玉竹甚者可加石膏黃耆湯治肺腎兩虛飲少瘦多黃耆三錢五味子一錢人參麥冬枸杞子大熟地各一錢五分水煎服此方宜加花粉百合北沙參去心蒸過天冬否則必致發燒熱淋淋者小便頻數不得流通溺已而痛是也大抵由膀胱經濕熱所致然淋有六種一曰石淋下如砂石有似湯瓶久在火中底結白鹼也益元散加琥珀末主之二曰膏淋滴下濁液加脂膏也萆薢飲主之三曰氣淋氣滯不通水道阻塞臍下妨悶脹痛是也假蘇散主之四曰血淋瘀血停蓄莖中割病難忍是也生地四物湯加紅花桃仁花蕊石主之或兼服代抵當丸五曰勞淋勞力辛苦而發此為氣虛以至氣化不及州都補中益氣湯主之六曰冷淋寒氣堅閉水道不行其症四肢厥冷口鼻氣冷喜飲熱湯是也金匱腎氣湯主之淋症有虛有寒不當冠以熱字當照各書以淋濁二字名篇此段系淋症門下段系濁症門自分作兩篇看篇中分析五淋極顯極明後列各方悉合古法病初起時壯者服之即愈然此症虛者甚多有當佐滋陰者可加熟地枸杞巴戟天等味腎陰足則膀胱氣化也有中氣下陷者當佐人參大棗炙甘草胃氣充則小腸氣暢也更有久淋而膀胱氣陷愈利愈痛者自升舉膀胱之氣即於後列各方中加桂枝使餘熱從經絡而散往往見效此景岳五苓散所以用桂枝為君也更有過服金石熱藥敗精流注轉而為淋者又老人陽巳痿而思色以降其精則精不出而內敗以致大小便牽痛如淋愈痛則愈便愈便則愈痛宜用前萆薢飲去黃柏加菟絲遠志導去其精然後用六味地黃湯補之方為有益淋症多端未可執一而論也此段應用濁症看按濁症多由忍精不泄所致精已離位黏於精管溺管交會之間極澀極痛不急利去則發為便毒矣又有夜夢交接將泄忽醒精未極出者其病亦同當用萆薢滑石瞿麥匾蓄海金砂文蛤等類急化其淤甚者遵古法加硝石礬石更有曠夫夜夜思色相火內煽精常離位每有真精一點似黏不黏隨陽萎而下似泄未泄其症甚重吐血干嗽骨蒸多由於此當清其心火伏其相火微固其精六味地黃湯加硃砂蓮子心牡蠣蓮鬚重用丹皮與治相火遺精法相等但彼以澀為主此以清為主耳益元散甘草一兩滑石白膩者水飛過六兩此方加秋石更效萆薢飲治膏淋並治諸淋萆薢三錢文蛤粉研細石韋車前子茯苓各一錢五分燈心二十節蓮子心石菖蒲黃柏各八分此方甚合古方歷用有效代抵當丸生地當歸赤芍各一兩川芎五靈脂各七錢五分大黃酒蒸一兩五錢砂糖為丸每服三錢開水下此方只走大腸在此篇中當加木通滑石琥珀澤瀉椒目等類小便不通關格孕婦轉脬小便不通謂之癃閉癃閉與淋症不同淋則便數而莖痛癃閉則小便點滴而難通東垣云渴而小便不利者熱在上焦氣分也宜用四苓散加山梔黃芩等藥以分利之若大便亦閉加大黃元明粉之類不渴而小便不利者熱在下焦血分也宜用滋陰化氣之法若滋腎丸之類是已大法無陽則陰無以生無陰則陽無以化下元真陰不足則陽氣不化必滋其陰若下元真陽不足則陰氣不生必補其陽譬如水腫鼓脹小便不通者服金匱腎氣丸而小便自行陰得陽以生也復有除桂附服之而亦效者陽得陰而化也此陰陽氣化之精義也水穀入胃未能分清同入於小腸雖分而猶同行也至下口分為兩歧濁而有物者入大腸清者積於膀胱之上膀胱有下口無上口其水其自微空而下其孔若有若無滲入其內也初入時附入四周積而下注至於膀胱下口而後從溺管出小腸不利者宜木通眼孔不利者宜椒目以刺之膀胱火盛其鼓如球水不下者宜葡萄以墜之膀胱內氣滯水不得降者宜豬苓以和之下口不開者宜車前子滑石溺管不通者宜甘草梢此有形之治法也至若無形之治一曰天水不降全責之肺但見胸脹氣促者以滋肺降肺為主百合沙參桑白皮枇杷葉之類是也有腎氣不化者滋陰藥內以巴戟天淫羊藿為主偏寒者加入桂附八味丸內偏熱者加入知柏八味丸內更有濕熱癃閉者遵古法用螻蛄焙焦為末以酒送下藉其下鑽之性屢見奇效臨症指南所列各方亦不外此數者詳繹其藥味可也此篇引東垣熱在上焦一語即喻嘉言主肺之說特未明顯耳所列四苓散加潤肺降肺之藥可也若與大便同閉其病危在頃刻責在小腸下口非黑醜不能開熱症與大黃同用寒症與去油巴豆同用加和血利水之藥仍以木通猾石為主更有小便不通因而吐食者名曰關格經云失則不得小便格則吐逆關格者不得盡其命矣宜用假蘇散治之古人名噎膈多曰關格三陽火盛大便多結三陽者足陽明胃手陽明大腸手太陽小腸也若小便亦閉是燥又傳膀胱而四陽矣故曰不得盡其命矣亦惟清潤藥中多加秋石滑石童便而已按此條當附噎膈篇下不應在此茯苓升麻湯茯苓赤白各五錢升麻一錢五分當歸一錢川芎一錢苧麻根三錢急流水煎服或調琥珀末二錢服更佳此方治孕婦轉脬有效本草綱目滑石下附方亦當參酌大便不通大小腸交遺屎脫肛經曰北方黑色入通於腎開竅於二陰是知腎主二便腎經津液乾枯則大便閉結矣然後實閉虛閉熱閉冷閉之不同如陽明胃實燥渴譫語不大便者實閉也小承氣湯下之若老弱人精血不足新產婦人氣血乾枯以致腸胃不潤此虛閉也四物湯加松子仁柏子仁肉蓯蓉枸杞人乳之類以潤這或以蜜煎導而通之若氣血兩虛則用八珍湯熱閉者口燥唇焦舌胎黃小便赤喜冷惡熱此名陽結宜用清熱及攻下之法三黃枳朮丸主之冷閉者唇淡口和舌苔白小便清喜熱惡寒此名陰結直用溫藥而兼潤燥之法理中湯加歸芍主之凡虛人不大使未可勉強通之大便雖閉腹無所若但與潤劑積久自行不比傷寒邪熱消爍津液有不容刻緩之勢也予嘗治老人虛閉數至圊而不能便者用四物湯及滋潤藥加升麻屢試屢驗此亦救急之良法也傷寒溫疫傳裡應下這症自有成法不必復贅以免混人心目此篇專指雜症而言老人津燥新產血柘二症此篇用藥甚善若虛者當補只可用人參加入清潤通利藥內斷無用耆術致壅其氣之理寒結之症可依東垣法用支油巴豆通之更無用附子乾薑復耗津液之理八珍理中之方非此門應用之藥也總之便閉之症無論寒熱虛實而大腸未有不燥者況沉寒痼冷之病寒凝肝腎火逼二腸大便於結十居八九投以肉桂熟地冰開凍解有形之冷積自然洞下無取乎攻矣更有肝氣拂逆心火鬱結下焦氣亂二腸失其轉運之機者應用古方更衣丸以硃砂鎮心蘆薈泄肝取效甚捷其肝腎寒極火逼二腸反成實熱目黃神昏者有肉桂大黃並用之法腎虛小便過多因而大腸燥結者收其小便大腸自潤此外則有鬱熱濕熱腎燥風閉來因不同臨症指南方案俱備臨時參證其腸痹便閉臨症指南另立一門兼治肺經用藥多主氣分上竅開則下竅自通也總不外臟宜堅實腑宜流通二語一切補藥皆當慎用澀藥燥藥更當切戒麻仁用過之多反增腸垢益加黏滯須加瓜蔞山楂糞燥如石硝黃不能推蕩者須佐蜣螂糞至肛門過燥過大蜜煎不能導者則須無鋒挖耳挖之大小腸交陰陽拂逆也大便前出小便後出名曰交腸五苓散主之復有老人陰血於枯大腸結燥便溺俱自前出此非交腸乃血液枯涸之徵氣血衰敗之候也多服大劑八珍湯或可稍延歲月耳膀胱有下口無上口小腸之水皆從也孔眼滲入有形之糞如何得下即曰所下只是糞汁其孔眼之開大已甚矣當先用槐實山渣酌用大黃引以豬大腸通其大便而後急用桑螵蛸豬脬彌其孔眼再用石斛萆菓分清之藥若劇用五苓豈非驅其有形之糞盡推於膀胱之上乎不發痛毒必變鼓脹矣遺屎有二症一因脾胃虛弱倉廩不固腸滑而遺者一因火性急速逼迫而遺者宜分別治之脾虛理中湯火盛芍藥甘草湯加黃連此症屬虛者多屬熱者少屬熟者後列之方加槐花澤瀉可也屬虛者急當澀腸固氣歸脾湯加肉豆蔻慄殼澤瀉甚者加赤石脂糯米萬論是虛是熱澤瀉必不可少蓋小便利大便方實也脫肛亦有二症一因氣盛下陷而脫者補中益氣湯一因腸胃有火腫脹下脫者四物加升麻黃芩荷葉之屬脫肛一症各家所論紛紜不一有主氣陷者有主濕熱者其實虛者居多二者相兼之症更多也初起或當用清若清之三五服不愈者仍以固氣為主所謂陷者舉之也應用升麻秦艽荷葉等藥加入補入益氣湯內景岳全書立有專門一以補氣為主臨症指南亦然即治濕熱方內必加人參更有補脾溫腎這法可知此症斷不一味清涼也本草綱目附方鱉頭焙焦為末黃酒沖服每獲奇效可與補中益氣湯輪流間服此症大便滑順者易治用藥收攝之後大便不甚努力則收者不復則脫矣若大便乾燥者必努力而後出則肛門隨收隨脫多成敗症故只可固氣不可澀腸赤石指龍骨訶黎勒肉豆蔻粟殼連蕊皆不可用也小便不禁經云膀胱不利為癃不約為遺溺所以不約者其因有三一曰肝熱肝氣熱則陰挺失職書云肝主琉泄是已加味逍遙散主之二曰氣虛中氣虛則不能統攝以致遺溺十補湯主之大抵老幼多見此症悉屬脬氣不固老人挾寒者多嬰兒挾熱者眾挾寒者用本方挾熱者六味地黃刃三曰腎敗狂言反目溲便自遺者此腎絕也傷寒日久見之多難救中症見之隨用大劑附子理中湯頻灌間有得生者益暴脫者可以暴復若病勢日深則不可為也然中症亦有陰虛而遺溺者不意偏用熱藥治者詳之此三說也主肝熱者甚少主氣陷者為多補中益氣之法所不可少蓋系治本之道而非救急之法論其病源總是腎虛關門不固應以樸腎固陽為主鹿茸故紙鎖陽皆收縮小便之要藥火衰者量加桂附合枸杞熟地為丸與補中益氣法輪流間服仍應審其為小腸虛或膀胱虛分別施治小腸虛者溺後繞臍空疼膀胱虛者溺後小腹空疼小腸虛多加小茴香膀胱虛多加韭菜子而以桑嫖峭填彌膀胱孔眼為要古方鞏堤丸以韭菜子為君者取其氣臭如積溺以類相求故能大補膀胱之氣也便血便血症有腸風有臟毒有熱有寒病人臟腑有熱風邪乘之則下鮮血此名腸風清魂散主這若腸胃不清下如魚腸或如豆汁此名臟毒芍藥湯主之凡下血症脈數有力唇焦口燥喜冷畏熱是為有火宜用前方加黃芩丹皮生地之屬若脈細無力唇淡口和喜熱畏寒或四肢厥冷是為有寒宜用溫藥止之理中加歸芍主之若便久不正氣血太虛宜用歸脾十全輩統血歸經血本屬陰生於陽氣治者宜滋其化源便血一症景岳東垣一主補氣升陽丹溪河間一主滋陰涼血其實兩法不可偏廢初起多熱久則無不虛也但有陰虛陽虛之分耳腸風者由於外感手第二指或麻或痛尺脈浮大血色甚鮮以秦艽柏葉地榆主之臟毒者由於醇酒厚味血色紫與汙垢同下以山楂黃連赤芍銀花主之除此二者之外皆屬虧損之著有肺陰虛火傳大腸者清肺滋陰百合桑葉枯芩清其上源可也有心經火盛由小腸傳入大腸者柏子仁松子仁麥冬養其化源可也有脾陽虛不能統血者歸脾湯加地榆樗根白皮有肝氣逆不能藏血者七寶美髯丹去杜仲故紙加女貞白芍槐花地榆下血既久胃有漏竅者用赤石脂禹餘糧堵截之法腎陽已虛將成敗症者右歸丸多加鹿茸以槐花地榆煎湯送下大概補氣用參非極虛不用耆術清火止於銀花黃芩非極熱不用黃連視其病源起於某臟某腑按經用引加熟地人參以生以補方無日久血脫之慮尿血心主血心氣熱則遺熱於膀胱陰血妄行而溺出焉又肝主疏泄肝火盛亦令尿血清心阿膠散主之平肝加味消遙散主之若久病氣血俱虛而見此症八珍湯主之凡治尿血不可輕用止澀藥恐積淤於陰莖痛楚難當也尿血危症也方書以血在溺前者非在溺前乃與溺俱出者也非僅膀胱之血其中有腎血焉血在溺後者非僅小腸之血其中有心血焉腎血動由於色欲過度相火沸騰心血動由於憂憤不解君火離位皆情志內生之火耆術之補以傷陰知柏之清以亡陽是速其死耳治腎血者用枸杞子地骨皮沙菀子五味核淡菜龜膠以柔養之治心血者以柏子仁松子仁阿膠麥冬棗肉硃砂以鎮養之庶可多延風月三十年來歷見前輩名醫從無治愈此症者全在病人心境開闊回頭是岸耳臨症指南醫門法律皆不特立專門良有故也遺精清心丸清心火瀉相火安神定志止夢泄生地酒洗四兩丹參二兩黃柏五錢牡蠣山藥棗仁炒茯苓茯神麥冬各一兩五錢北五味車前子遠志各一兩用金櫻膏為丸每服三錢開水下此有如退體弱之人可去黃柏加龍骨最妥心神虛者其丸以硃砂為衣惟金櫻子最難去毛丸藥中去之不淨則有刺骨之虞合藥時應慎重將事赤白濁濁之因有二種一由腎虛敗精流注一由濕熱滲入膀胱腎氣虛補腎之中必兼利水蓋腎經有二竅溺竅開則精竅閉也濕熱者導濕之中必兼理脾蓋土旺則能勝濕且土堅凝則水自澄清也補腎菟絲子丸主之導濕萆薢分清飲主之或問濁有赤者何也答曰此濁液流多不及變化也又或心火盛亦見赤色宜加入蓮子心燈心丹參等藥則愈矣濁症多因精已離位未經泄出有夢中正當交媾忽然驚醒而未及泄者有忍精行房精已離位而中止者其敗精皆積精管之中治稍遲則發便毒宜用萹蓄瞿麥海金砂加入五苓散利之敗精去濁自止日久不愈漸見腰腿疼痛者滑也虛也前篇精心丸內加入參耆自止若相火不旺之人即用前篇十樸丸黃疸黃疸者目珠黃漸及皮膚皆見黃色也此溫熱壅遏所致如屈曲相似濕蒸熱鬱而黃色成矣然濕熱之黃黃如橘子蘖皮因火氣而光彩此名陽黃又有寒濕之黃黃如薰黃色暗而不明或手足厥冷脈沉細此名陰黃陽黃者枝子蘖皮湯若便閉不通宜用茵陳大黃湯陰黃者茵陳五苓散如不應用茵陳姜附湯其間有傷食者名曰谷疸傷酒者名曰酒疸出汗染衣名曰黃汗皆陽黃之類也谷疸胸膈滿悶噯腐吞酸以加味枳朮湯加茵陳治之應手取效酒疸更加葛根黃汗用枝子蘖皮湯加白朮其同有女勞疸乃陰黃之類宜用姜附湯加參朮補之復有久病之人及年老人脾胃虧損面目發黃其色黑暗不明此臟腑之真氣泄露於外多為難治宜用六君子湯主之黃脾之本色也健脾以白朮為主去黃不論寒熱以茵陳為主傷寒溫疫發黃古人有用大黃之法蓋其病源兼外邪也若本病虛者萬勿孟浪此門當遵景岳全書最好此篇言其大概耳不能食許學士云不能食者未可專責之脾腎經元陽不足不能熏蒸腐化魯如釜中水穀底下無火其何能熟火為土母虛則補其母庶元氣蒸騰飲食增益八味丸主之八味丸惟老人宜之若中年人有此症青娥丸可也不得臥有胃不和臥不安者胃中脹悶疼痛此食積也保和湯主之有心血空虛臥不安者皆由思慮太過神不藏也歸脾湯主之有風寒邪熱傳心或暑熱乘心以致躁擾不安者清之而神自定有寒氣在內而種不安者溫之而神自藏有驚恐不安臥者其人夢中驚跳怵惕是也安神定志丸主之有濕痰壅遏神不安者其證嘔惡氣悶胸膈不利用二陳湯導支其痰其臥立至更有被褥冷暖太過天時寒熱不勻皆令不得安臥非關於病醫有慎勿誤治也不寐之症篇中治法頗善而歸脾湯非加麥冬必生煩躁屢試屢驗仲景金匱要略以不寐之症為陽維脈滿蓋陽維貫心脈滿則心氣脹也故不寐其方用半夏秫米百揚水煎之百揚水即井水用碗揚百遍也秫米即高粱米余嘗用之其效如神本草言秫米或以為黍或以為粟谷之白者非也癲狂癇定癇丸男婦小兒癇症並皆治之凡癲狂症亦有服此藥而愈者明天麻一兩川貝母一兩膽南星九制者五錢半夏薑汁炒一兩陳皮洗去白七錢茯苓蒸一兩茯神去木蒸一兩丹參酒蒸二兩麥冬去心二兩石菖蒲石杵碎取粉五錢遠志去心甘草水泡七錢全蠍去尾甘草水洗五錢殭蠶甘草水洗去嘴炒五錢真琥珀腐煮燈草研五錢辰砂細研水飛三錢用竹瀝一小碗薑汁一杯再用甘草四兩熬膏和藥為丸如彈子大辰砂為衣每服一丸照五癇分引下犬癇杏仁五枚煎湯化下羊癇薄荷三分煎湯化下馬癇麥冬二錢煎湯化下牛癇大棗二枚煎湯化下豬癇黑料豆三錢煎湯化下日再服本方內加人參三錢尤佳癲狂即俗所謂瘋症也本草綱目附方良方甚多但皆峻猛之藥駭人聽聞景岳全書中治法詳備但失之偏補其理須知非行醫之道也行醫者即照此方為善余少年時即用此方治愈數人矣驚悸恐驚者驚駭也悸者心動也恐者畏懼也此三者皆發於心而肝腎因之方書分為三門似可不必經云東方青色入通乎肝其病發驚駭驚雖屬肝然心有主掛則不驚矣心驚然後膽怯乃一定之理心氣熱硃砂安神丸主之心氣虛安神定志丸主之悸為心動謂之證忡心築築而跳搖搖而動也皆由心虛挾痰所致定志丸加半夏桔紅主之恐為腎志亦多由心虛而得經云心怵惕思慮則傷神神傷則恐懼自失十全大補湯主之若腎經真陽不足以致恐者更佐以八味丸加鹿茸人參之類子嘗治驚悸恐懼之症有用大補數十劑或百餘劑而後愈者毋謂七情之病而忽之也心病還須心藥醫此等症心境不開藥無濟也必須用藥即照此書可耳臨症指南良方甚多宜合參眩暉眩謂眼黑暈者頭旋也古稱頭眩眼花是也其中有肝火內動者經云諸風掉眩皆屬於肝是也逍遙散主之有濕痰壅遏者書支頭旋眼花非天麻半夏不除是也半夏白朮天麻湯主之有氣虛挾痰者書曰清陽不升濁陰不降則上重了輕也六君子湯主之亦有腎水不足虛火上炎者六味湯亦有命門火衰其陽上泛者八味湯此治眩暈之大法也首段主肝風治以逍遙散只好一二服以驅經絡風熱而已多服發揚過甚反益頭暈宜遵臨證指南柔肝息風之法益風從內起仍當從內息與外感之風不同也次段濕痰當與各書痰飲門參看三段虛痰用六君子健脾行痰之後即當繼補命門元陽輕者青娥丸重者右歸丸再重者八味丸四段五段得病之源專於補腎無有不愈相其人這寒熱虛實以用藥總以熟地枸杞骨碎補為君不必拘定成方也治眩暈病起手宜清以散經絡之火邪清後宜滋肝陰以去生風之源滋後定溫蓋命門火潛密真水自旺水旺生木木柔潤則自然風息矣健忘經云腎者作強之官技巧出焉心者君主之官神明出焉腎主智腎虛則智不足故喜忘其前言又心藏神神明不充則遇事遺忘也健忘之症大概由於心腎不交法當補之歸脾湯十補丸主之亦有痰因火動痰容心胞者此乃神志昏憒與健忘症稍不相同法當清心開竅二陳湯加竹瀝薑汁並硃砂安神丸主之欲使心腎相交必須心腎兩補補心陽益智仁龍眼肉補心陰柏子仁補腎陽故紙鹿茸補腎陰熟地枸杞補腎氣骨碎補欲使心腎之管交通非遠志不可但用遠志必須甘草水浸透支心蒸過再炒方敢入藥不然其毒甚大不可不知遇此症即照此裁方非歸脾湯專補上中所能奏效也痰客心胞一解甚好此症多由勞碌過甚心欲不遂而得即照硃砂安神丸加石菖蒲可也嘈雜嘈雜者躁擾不寧之貌得食暫已少頃復嘈其中有挾痰與火者則口燥唇焦脈滑數也二陳湯如山梔黃連之類有脾虛挾痰者則氣促食少脈小弱也五味異功散主之嘈雜之症治失其宜變為噎塞者眾矣可不慎乎更有無氣大虛心中擾亂不安者名曰虛煩此與嘈雜不同當按其虛而重補之夫病有兼症各有情形善治者宜斟酌焉脾虛挾痰者胃陽必虛六君子湯中稍加煨姜甚效甚捷亦有胃陰虛者臨症指南有大用玉竹之法千古金針也更有食蔥蒜韭菜等辛熱之物後為風寒所閉欲吐不吐嘈雜難過者宜山楂枳實以推之再服元明粉以滌之再嚼陳皮務使辣涎吐出然後飲糖水以潤之治之稍遲辣毒挾風入於胃之下脘少壯者發牙疳老年者即變膈症已見之屢矣咽喉口舌齒唇咽喉之病挾熱者十之六七挾寒者十之二三而風寒包火者則十中之八丸古人開手一方只用甘草桔梗三因方加以荊芥其他蒡子薄荷貝母川連之類皆出後人續補可見咽喉之病不便輕用涼藥而專主開發升散者所謂結者開之火鬱發之是已及其火勢極盛則清劑方施結熱下焦而攻法始用非得已也方書雜稱咽喉為三十二症命名各殊治法亦異眩人心目茲予細加訂正不遺不贅並選古今治法而擇其平善至效者詳列於左誠以咽喉關要之地命如懸縷學者宜致思焉凡治咽喉口舌之症初則疏風解毒繼則滋水養陰若元氣漸虛急顧脾胃如六味滋水四君補脾皆為要藥否則真氣方敗勢難挽矣治者審之篇內咽喉唇舌諸急症全靠針砭藥以佐之而已治法詳備可遵可行所用黃薤汁急切難得即用涼水搗蒜汁灌之亦可然總不如京城紫金錠之速也此篇未備者詳參臨症指南醫宗金鑑二書若景岳全書此門皆偏於補不可用也目凡目疾暴赤腫痛畏日羞明名曰外障實症也久痛昏花細小沉陷名曰內障虛症也實者由於風熱虛者由於血少實則散風瀉火虛則滋水養陰然散風之後必繼以養血經曰目得血而能視也養陰之中更加以補氣經曰氣旺則能生血也治外障者蒺藜湯蟬花無比散散之若兼飲食所傷加消導藥如大便入閉不通四順清涼飲下之治內障者消遙散明目地黃丸補之若兼氣虛益氣聰明湯主之且如初起翳障只須服藥散之不可遽用點藥恐病反深痼當用天然水乘熱頻洗之熱能散風水能制火故也水中不用一味藥蓋目不染塵藥汁入目亦見羞澀更忌刀針刺血割肉及點硇砒之類真為行險僥倖刺血者恐傷肉用硇砒恐潰爛不息惟宜珍珠散點之乃眼藥中之至寶也治眼之法內服之藥功居其半外點之藥功居其半篇中所論極詳後開各方亦極穩妥然揣先輩之心不求有功先求無過耳如欲見功當於醫宗金鑑中求之再凡用散藥不可太過以傷其血用補氣藥不可太過以助其火又不宜過用寒涼使血脈凝結反生青黃之障膜溫存肝腎調劑和平而目疾自全愈矣久病者宜參耆初發者須慎用蓋恐氣積火壅也明目地黃丸治內障隱澀羞明細小沉陷生地酒洗一斤牛膝二兩麥冬六兩當歸五兩枸杞子三兩用甘菊花八兩熬膏和煉蜜為丸每服三錢開水下此等症多兼陽虛宜用熟地鹿茸故紙非僅請滋所能奏功也天然水用潔淨開水以法淨茶盞盛之用潔淨元色絹片乘熱淋洗洗後水混濁換水再洗及洗至水清無垢方止如此數次即愈水內並不用藥故曰天然水也此方嘗試之矣雨水效井水不效面經云足陽明之脈絡面下於鼻凡面上浮腫而痛者風也書云面腫為風足腫為水宜用升麻葛根湯加白芷主之若兼挾水濕加入五皮飲為至妙也然又有黃伴面腫者濕熱也有萎黃虛浮者脾虛也濕熱和中丸主之脾虛六君子湯主之若面上生蒼知水痘蔓延不止者黃藥敷之即愈黃胖面腫者其人多便血痿黃面腫者其人多脾瀉須問明白照本症治之若只浮腫而帶紅色者乃真風熱也升麻葛根湯加蒼耳子三兩劑愈矣詳參醫宗金鑑面部瘰癧瘰癧者肝病也肝主筋肝經血燥有火則筋急而生瘰瘰多生於耳前後者肝之部位也其初起即以消瘰丸消散之不可用刀針及敷潰爛之藥若病久已經潰爛者外中普救萬全膏內服消瘰丸並逍遙散自無不愈更直戒惱怒斷煎炒及發氣閉氣諸物免致膿水淋漓漸成虛損患此者可毋戒與瘰病肝膽二經之病也結於肝而發於膽諸家皆以夏枯草金銀花蒲公英昆布等為主佐以香附浙貝母無不應驗外治之法將蜣螂炸枯熬成膏藥貼之自軟他藥損皮多成變症再照景岳全書艾灸肘後之法立見束效鼻若鼻中常出濁涕源源不斷者名曰鼻淵此腦中受寒久而不散以致濁涕常流如泉水之涓涓耳然鼻淵初起多由於寒日久則寒化為熱矣治宣通竅清熱川芎茶調散主之更有鼻生瘜肉名曰鼻痔臭不可近艱不可搖宜用白礬散少許點之頃刻化水而消又算中流血不止名曰鼻衄四生丸生地六味湯主之如不止加犀角鼻淵鼻痔等症即照篇中治法可也至於衄血當求之任脈督脈督脈氣旺載血上行任脈陰弱不能承接則血溢從鼻而下治法詳見臨症指南方法甚多非四生湯等所能盡也耳凡傷寒邪熱耳聾者屬少陽症小柴胡湯主之此一段系傷寒少陽經症已詳載傷寒篇中此際當刪去以清眼目若風熱相搏津液凝聚變為停豆抵耳之患或膿水淋淳或癢極疼痛此皆厥陰肝經風熱所致宜用加味逍遙散支白朮加荷葉木耳貝母香附葛蒲之屬外用紅棉散吹之若耳內生瘡並用前藥加金根花主之耳內生瘡其膿極臭帶青色痛極者以燈心黃柏燒灰少加冰片吹之可止痛亦有用胭脂燒灰存性加冰片少許吹之之法俟有膿根如豬胰者出則自愈矣痔瘡方韋有牝牡血之蟲異名而其實皆大腸經積熱所致大法宜用石菖蒲忍冬藤煎水以瓦罐盛藥對痔薰透然後傾入盆中浸洗之冷則加水如此頻頻薰洗並服加減六味丸及國老散自然漸次消散可免刀升藥錢之苦此亦醫痔之良法也痔漏一門惟景岳全書言之甚詳內外治法各方用之皆效最妥者蝸牛加冰片化為水點之立即止疼真神方也懸癰臟毒外科大成皆有專門宜合參之暴崩下血經云陰虛陽搏謂之崩此言熱迫血而亡行也又曰陽絡傷則血外溢陰絡傷則血內溢外溢者從上出內溢者從下流也病人過於作勞喜怒不節則絡脈傷損而血妄行矣前症若因熱迫血而妄行者用加味四物湯若因絡脈傷損者用八珍湯若淤血凝積佐以獨聖丸若因肝經火旺不能藏血者加味逍遙散若因脾氣虛不能統血者四君子湯加歸芍主之若因思慮傷脾不能攝血歸經者歸脾湯若氣血兩虧血崩不止更用十全大樸湯此篇所論血症治法至精至善宜恪遵之另擬止血崩方臨症參酌止血崩方鹿角霜一兩煅龍骨八錢續斷炒一兩五錢上阿膠蛤粉炒珠六錢當歸身土炒一兩焦川芎三錢云茯神一兩炙香附八錢炙甘卓一錢焦杜仲一兩柏子仁一兩共為細末獨山藥四兩煮糊為丸焦芥穗煎湯沖服診婦人有孕法經謂婦人有孕者身有病而無邪脈也有病謂經閉無牙脈謂脈息如常不斷絕也經又云手少陰脈動甚者孕子也少陰心也心主血脈心脈旺則血旺而為孕子之兆經又云陰搏陽別謂之有子言二尺脈匠與兩寸迥別亦謂有孕以上三者但得其一即分孕脈分而占之合而推之而孕脈無盾情矣若兩關滑而流利必是孕也蓋兩關者肝脾之部位肝藏血脾統血血不流行於經乃凝成而為孕所以現於兩關滑而和勻最為有準至於經閉之脈必澀滯亦不定在西關而有孕之脈必滑利且一定在兩關又初孕之時常見兩盡沉伏之狀不可不知也惡阻妊娠之際經脈不行濁氣上於清道以致中脘停痰眩暈嘔吐胸膈滿悶名曰惡陰法歸理脾化痰升清降濁以安胃氣用二陳湯加枳殼主之若脾虛者用六君子湯加蘇梗枳殼砂仁香附主之其半夏雖為妊娠禁藥然痰氣陰塞中胱陰陽拂逆非此不除以薑湯泡七次炒透用之即無礙也若與參朮同行猶為穩當凡安胎氣止嘔定眩須用白朮為君而以半夏茯苓陳皮砂仁佐之往往有效夫妊娠邳阻似屬尋常然嘔吐太多恐傷胎氣醫者可不善為調攝乎婦人受孕之後一月腎經養胎二月肝經養胎三月脾經養胎凡惡阻之症皆在受孕兩個月之後出三個月之期則自止矣蓋其時脾經之血盡入胎胞不能運動胃氣故也不必深治只以白朮補脾陽菟絲補脾陰玉竹補胃陰稍加砂仁以和胃氣足矣痰多者加薄橘紅腰疼者加杜仲嘔甚帶血者加黑梔子有熱者可加黃苓萬不可過消過降致損胎元枳殼猶可半夏香附皆禁藥也篇中若與參朮同行猶為穩當句猶字似為尤字之誤胎動不安妊娠胎動不安多因起居不慎或飲食觸犯禁忌或風寒搏其衝任這脈或跌僕傷損或怒動肝火或脾氣虛弱宜各推其因而治之大法若因母病而胎動但治其病而胎自安若因胎功而致病但安其胎而母病自愈再診其色若面赤舌青則子難保若面青舌赤吐沫母亦難痊娠妊中切宜戒謹安胎飲當歸川芎白芍藥酒炒大熟地九制茯苓阿膠各一錢甘草炙艾葉各三分白朮二錢水煎服若起居不慎加人參董耆杜仲續斷若飲食觸犯加人參倍加白朮若風寒相搏當按經絡以治風寒若跌僕傷摜另用佛手散加青木香益母草若怒動肝火本方加柴胡山梔若脾氣虛弱去熟地加人參扁豆陳皮然因時調治對症處主全在活法不可膠執也起居不慎杜仲續斷外重加紫何車食積胃中加神麯風寒相搏太陽羌活陽明葛根少陽柴胡跌僕損傷胎必難保姑存佛手散法若脾氣虛弱熟地不必去再加菟絲子古人安胎之法只用杜仲續斷二味蓋杜促溫固肝腎之氣能托胎炮續斷寧血靜血收衝脈散漫之氣無他藥也後人不明此理改用當歸川芎大失長沙青囊之旨矣焉有動血方物而能安胎者乎試觀臨症指南胎前所列三十三方當歸偶一用之川芎截然不用理可知矣余少年時讀達生篇濟陰綱目及馮氏錦囊書亦用今法動輒得咎自改用古法十全八九此親自閱歷者也至於艾葉必煮之極熟炒之極透而後敢用否則胎懸汗出不可救矣改擬一方附之於下改擬安胎飲杜仲醋炙一錢半川續斷一錢半熟地二錢山藥炒二錢阿膠生一錢菟絲子蒸姘一錢茯苓一錢野艾葉醋煮一注香再炒三分胎漏女人之血無孕時則為經水有孕時則聚之以養胎蓄之為乳汁若經水忽下名曰漏胎血瀝盡則胎不保矣大法若因風熱動血者用四物湯送下防風黃芩丸若因血虛用本方加茯神阿膠艾葉若因怒動肝火用加味逍遙散若去血太多用八珍湯如不應用補中益氣湯凡脾虛下陷不能攝血歸經者皆宜補中益氣假如氣血俱盛而見紅者乃兒小飲少也不必服藥胎漏者即杯孕見紅也有兩說胎已動而見血者即是小產之候大劑補中益氣湯去柴胡加阿膠杜仲續斷艾葉十中可保一二其胎不功而漏血者即是篇中所列各症因風一條必須實有鼻塞聲重項脊強痛者而後防風可用怒動肝火一條只宜女貞白芍多加阿膠肝柔則血自止逍遙散中有香附不可輕施也以後各條皆系良法宜恪遵之胎期肺胃多熱實有因血熱而妄行者黃芩丹皮皆可酌用子懸子眩子懸者胎上逼也胎氣上逆緊塞於胸次之間名曰子懸其症由於恚怒傷肝者居多亦有不慎起居者亦有脾氣鬱結者宜用紫蘇飲加減主之更有氣逆之甚因而厥暈名曰於眩並用前藥主之然子眩有神虛挾痰者宜用六君子湯若頑痰閉塞而脾氣不虛者二陳湯加竹瀝薑汁虛實之同所當深辨也於懸一症各書皆以蘇子一味為主降至胃口下界而止過降則墜矣只用蘇子川貝母地黃白芍自降自安萬無用木香檳榔腹皮之理子眩即暈症也多系肝虛且有挾內風者宜女貞菊花黑芝麻阿膠以滋陰而息風安有升散而能止暈者乎挾痰者只宜川貝母橘江竹茹方不動胎若半夏南星皆在當禁紫蘇飲治子懸並催生順產神效當歸川芎紫蘇各一錢甘草炙人參白芍藥酒炒各五分大腹度黑豆煎水洗八分上生薑一片蔥白一寸水煎服前症若因恚怒傷肝者加柴胡若因不慎起居者加白朮砂仁若因脾氣鬱結者加木香胎既懸矣可用人參以提之乎胎即動矣可用腹皮以破之乎以蘇子為紫蘇想系翻刻之誤設後人認做蘇葉一經升散口鼻出血矣此方不可拘執當於景岳全書胎產秘書中求之胎不長妊娠胎不長者多因產母有宿疾或不慎起居不善調攝以致脾胃虧損氣血衰弱而胎不長也法當祛其宿疾補其脾胃培其氣血夏加調攝得宜而胎自長矣補脾胃五味異功散主之培氣血八珍湯主之祛宿疾隨症治之此症甚少要以飲食調養為主徒恃藥無益也後開用藥之法盡美盡善半產半產者小產也或至三五月而胎墮或未足月而欲生均謂之小產小產重於大產蓋大產如瓜熟自落小產如生斷其根帝豈不重哉其將產未產之時當以安胎為急安胎飲主之既產而腹痛拒按者此瘀血也法空祛瘀生新當歸澤蘭湯主之若小產後血不止或煩渴面赤脈虛徵者此氣血大虛也八珍湯加炮姜以補之若腹痛嘔瀉此脾胃虛也香砂六君子湯加姜柱以溫之其在產母更宜慎風寒節飲食多服補藥以堅固氣血毋使輕車熟路每一受孕即至期損功而養育維艱也戒之慎之小產多在受孕三個月期內以脾經養胎每因惡阻過甚不能統攝而墜然受孕日淺產婦易於調養傷生者少四個月其內墜者心徑養胎因血虛而墜也五個月期內墜者肺經養胎因氣虛而墜也產婦傷生亦少若五個月後小產者甚少偶有墜者或因大肆情欲或因觸動損傷或因他病其墜也如山崩河決產婦之命十不能保全一二矣大法防小產者未受孕之前宜預補肝脾以白朮二兩仁仲二兩川續斷一兩熟地一兩豬脾一條豬腎一對入烏骨母雞腹內水煮一炷香時水乾將雞焙去水氣取出前藥夏月去豬脾腎冬月前留之曬乾微炒共為細末煉蜜為丸服至百日再無小產之虞若已受孕而防墜者前方去熟地白朮只用杜仲續斷等如法制之十中亦全六七總以節飲食慎情欲戒煩怒為要也此症古方甚多用之多不見效惟此法屢試屢效此篇景岳主補氣恐致氣壅火積因熱而墜丹溪主涼血恐致脾衰胃冷因瀉而墜皆可隨症參用不可固執當歸澤蘭湯當歸澤蘭白芍酒炒川芎大熟地九制各一錢五分延胡索酒炒紅花香附丹皮各五分桃仁去皮尖及雙仁者炒研七粒水煎入童便熱酒各半盞熱服此方雖好不如生化湯之穩且習俗不尚用之恐駭人聽聞也子煩妊娠子煩者煩心悶亂也書去孕四月受少陰君火以養精六月受少陽相火以養氣子煩之症大率由此竊謂婦人有孕則君相二火皆翕聚以養胎不獨四六兩月而已大法火盛內熱而煩者淡竹葉湯若氣滯痰凝而悶亂者二陳湯加白朮黃芩蘇梗枳殼若脾胃虛弱嘔惡食少而煩者用六君子湯子煩之候不善調攝則胎動不安矣慎之子煩一症總是胃火盛津液乾涸心血虛內火燔爍也大忌燥熱之藥篇中淡竹葉湯與胎產秘書法合惟問有腰疼便溏者去知母可也胎前大忌半夏熱疾亦不宜白朮後列二方慎用子癇妊娠中血虛受風以致口噤腰背反張名曰子癇其症最暴且急審其果挾風邪宜用羚羊角散定之若兼怒動肝火佐以逍遙散加人參若兼胎氣上逆佐以紫蘇飲若兼脾虛挾痰佐以六君子湯若因中寒而發者宜用理中湯加防風鉤藤此症必須速愈為善若頻發無休非惟胎妊驟下將見氣血隨胎渙散母命亦準保全大抵此症胎氣未動以補氣養血定風為主胎氣既下則以大補氣血為主此一定之理子嘗屢治屢驗矣血虛受風似應為肝經受風果挾風邪當作只系風邪較妥子癇有二一為本無此病受孕後因肝處受風而得者篇中所論是也宜羚羊角散去防風加秦艽極穩極捷一為平日本有痛病受胎後發病較重者羚羊角散去防風獨活加熟地續斷阿膠景岳全書胎產秘書皆用此法二段兼怒宣逍遙散去柴胡加女貞子三段兼胎氣上逆羚羊角散加蘇子四段兼痰宜該方加茯苓川貝母橘紅竹茹半夏斷不可用五段兼寒不得已酌加小茴香吳茱萸更無用附子之理防風引熱藥入肺亦不相宜子鳴妊娠腹內自鳴系小兒在腹內哭聲也謂之子鳴又謂之腹內鐘鳴古方用鼠穴中土二錢加麝香少許清酒調下或用黃連濃煎呷之即止但黃連性寒麝香開竅不宜輕用此症乃臍上疙瘩兒含口中因孕婦登高舉臂脫出兒口以此作聲令孕婦曲腰就地如拾物一二刻間疙瘩仍入兒口其鳴即止可服四物湯加白朮茯苓一二劑安固胎氣此症一二日即止者小兒猶可活若過三日則臍早離口無血以灌注兒必死矣孕婦曲腰就地之法亦無甚效姑存之子喑妊娠至八九月間忽然不語謂之子喑但當飲食調養不須服藥昔黃帝問於岐伯曰人有重身九月而喑何也岐伯對曰胞胎繫於腎腎脈貫系舌本故不能言十月分娩後自為之言也賃按腎脈貫系舌本因胎氣壅閉腎脈陰塞致不能言自應調攝以需之不必驚畏或用四物湯加茯神遠志數劑亦可倘妄為投藥恐反誤事慎之此症之不必服藥出於內經自不可妄為臆說但經文既曰腎系舌本必系腎氣過虛因胎系下墜氣血下注不能上達耳自應大補腎中氣血以熟地骨碎補為主佐以枸杞沙苑氣血充旺上下自可兼及而能言矣新安汪前輩曾屢言之想不至誣然余未經親試也孕婦內癰孕癰腹內生癰也生於有妊之時猶為可畏宜用千金牡丹皮散或神效瓜蔞散治之但丹皮苡仁桃仁皆動胎之藥因有病則病當之故無損也凡遇此症十中九死不死亦必墜胎必不得已即用所開神效瓜蔞散多加續斷以固胎系在某經部位即用其經引藥猶為可畏之猶似應為尤鬼胎惟夫體質虛衰精神惑亂以致邪氣交侵經閉腹大如懷子之狀其面色青黃不澤脈澀細或乍大乍小兩手如出兩人或寒熱往來此乃肝脾拂鬱之氣非胎也宜用雄黃丸攻之而以各經見症之藥輔助元氣大法肝經鬱火佐以逍遙散脾氣鬱結佐以歸脾湯脾虛挾痰佐以六君子湯此症乃元氣不足病氣有餘或經事延期失於調補所致不可浪行攻系而忘根本則鬼胎行而元氣無傷矣肝脾鬱結而腹腫大者當求之氣鼓癥瘕兩門有水者參以水腫治法經閉者參以經閉法皆非鬼胎也鬼胎者其胎有實在形跡產時非怪物即血水也直當下之輕者即用雄黃丸重者平胃散加龍骨虎骨朴硝化下之然必實有瘋狂形跡者方可用也熱病損胎妊娠熱病不解以致胎損腹中不能出者須驗其產母面赤舌青者其子已損若面青舌赤母亦難全古方通用黑種散下之然藥性燥烈不宜於熱病應用平胃散加朴硝五錢下之為穩當也達生篇下死胎法只用平胃散加朴硝凡因傷寒瘟疫諸熱症者宜之若是冬月及體寒者仍以古法黑神散為是蓋附子墜胎取效甚速而藉補元陽下後亦易調理也妊娠小便不通孕婦胞胎墜下多致壓胞胞系繚亂則小便點滴不通名曰轉胞其禍最速法當升舉其胎俾胎不下墜則不便通矣舟溪用補中益氣隨服而探吐之往往有驗予用茯苓升麻湯亦多獲效皆升舉之意也然則仲景治轉胞用桂附八味湯何也予曰此下焦虛寒胎氣陰冷無陽則陰不化寒水斷流得桂附溫暖命門則陽氣宣通寒冰解凍而小便行矣況方內復有茯苓澤瀉為之疏決乎然亦有陽亢陰消孤陽無陰不能化氣者必須補其真陰古方用滋腎丸予嘗用六味加車前牛膝往往收功此症因胎壓膀胱者多丹溪用補中益氣升胎之法突開千古法門先生茯苓升麻湯後未開方不敢妄補但恐耆術壅滯耳何妨即用補中益氣湯多加參而去耆術也然又須加用桂枝蓋桂枝一散則膀胱之經絡一提經絡提膀胱起而復元矣然後以車前子利之無不通也按胎產秘書用豬膀胱一個生切方寸大片上攤桑螵蛸面一錢厚上覆豬網油一片再鋪上膀胱一片再攤桑螵蛸如是十餘次以膀胱用盡為度然後用豆腐皮包而蒸之極爛令產婦連豆腐皮食之立見效驗八味湯大熟地四錢山萸肉去核山藥各二錢丹皮茯苓澤瀉各一錢五分肉桂附子各五分雖因寒亦不必用桂附以傷胎六味地黃湯中加小茴香巴戟天淫羊藿自然腎經氣化而出矣滋腎丸黃柏知母各二兩肉桂一錢煉蜜丸每服三錢開水下雖因熱亦不可用知母黃柏以敗胃六味地黃湯中加麥冬元參自然肺陰下沛而出矣蓋水出高源也胎水腫滿妊娠胎水腫滿名曰子腫又名曰子氣其症多屬胞胎壅遏水飲不及通流或脾虛不能制水以致停蓄大法胎水壅遏用五皮飲加白朮茯苓主之脾虛不能制水用六君子湯主之凡腰以上腫宜發汗加秦艽荊芥防風腰以下腫宜利小便加車前澤瀉防己胎水通行生息順易宜先時治之不可俟其既產而自消也此篇治法大旨悉合惟六君子湯之半夏及五皮飲皆未免峻厲恐致傷胎論上下截以心坎骨為界在上者四君子湯加秦艽荊芥木通在下者宜遵胎產秘書鯉魚湯其法先以鯉魚煮湯加白朮木通車前子重者加冬葵子仁用之屢效此間鯉魚不可多得可多取魚鱗炒焦入藥其功同也乳自出妊娠乳自出名曰乳位生子多不育然予以為氣血虛弱不能統攝用八珍湯頻頻補之其子遂育此症甚少如遇之此法甚良宜遵之臨產將護法神驗保生無憂散婦人臨產先服一二劑自然易生或遇橫生倒產甚至連日不生速服一二劑應手取效永救孕婦產難之災當保子母安全之吉當歸酒洗一錢五分川貝母一錢黃耆八分白芍酒炒冬月用一錢一錢二分菟絲子一錢四分厚朴薑汁炒七分艾葉七分荊芥穗八分枳殼麵炒六分川芎一錢三分羌活五分甘草五分水二盅姜三片煎至八分空腹溫服此方流傳海內用者無不響應而制方之妙人皆不得其解是故疑信相半此方全是臨產催生妙用不至其期不可早服而達生篇注以胎動不安見紅者亦用此方壞事多矣華佗順生丹硃砂經研水飛五錢明乳香箬上炙乾一兩上為末端午日豬心血為丸如芡實大每服一丸用當歸三錢川芎二錢煎湯關下不經女人手順生丸硃砂五錢丁香五錢麝香一錢明乳香一兩石燕煅醋碎七次一對一雌一雄圓為雌長為雄上為末擇天月德日用益母草熬膏為丸如芡實大每服一二丸用歸芎湯送下催生如神散治逆產橫生其功甚大百草霜白芷不見火各為末等分每服三錢以童便米醋和如膏加沸湯調下或用酒煎加入童便少許熱服書云血見黑則止此藥不但順生大能固血又免血枯為妙先生所列催生三方未經試驗而皆和平之品母子兩全之道然遇危急之候兒身不順胞漿已破為時已久精神已敗勢不得不棄子留母擇各書猛峻奇方開列於後立竿見影方冬葵子仁一兩當歸五錢水煎濃服三脫散蛇蛻蠶蛻蟬蛻炒各一錢只為末黃酒下十產論節選四曰凍產天氣寒冷產母血氣凝滯難以速生則衣服宜厚產室宜暖下衣更宜溫厚庶兒易生更不宜火氣太熱恐致血暈燒透木炭多亦無妨若煤火過甚毒氣入鼻取禍甚速五曰熱產盛暑之月產婦當溫涼得中過熱則頭目昏眩而生血暈之症若涼臺水閣以及狂風陰雨更當謹避房中斷斷不許多人嘈雜否則積氣成穢產婦心中一煩即刻變症慎之慎之十曰盤腸產臨產子腸先出然後生子腸出時以極潔淨不破損漆器盛之古方用蓖麻子四十九粒研爛塗產母頭頂腸收上急洗去其腸若干以磨刀水少許溫潤之再用磁石煎湯服之即收上磁石須陰陽家用過有驗者磨刀水磁石湯用之皆駭人聽聞不如以芝麻當歸濃煎湯溫和潤之為妥余嘗親見之矣交骨不開產門不閉加味歸芎湯當歸五錢敗龜版童便炙酥三錢川芎三錢婦人頭髮一握燒灰存性水煎服約人行五里即生設是息胎亦下灼過龜版亦可用此方百試百驗萬叫萬靈不但開骨一切橫生倒產用之多方保全但龜版性寒服此者產後多致成痢不可不知也胞衣不下失笑丸治瘀血脹胞並治兒枕痛神效五靈脂去土炒蒲黃炒等分共為末醋糊丸如桐子大每服二三錢淡醋水下花蕊石散治產後敗血不盡血迷血暈胎衣不下脹急不省人事但心頭溫者急用一服灌下瘀血化水而出其人即蘇效驗如神醫家不可缺此花蕊石一斤上色硫磺四兩上為末和勻先用紙泥封固瓦罐一個入二藥仍用紙泥封口曬乾用炭煅二炷香次日取出細研每服一錢童便和熱酒調下甚者用二三錢牛膝散治胎衣不下腹中脹急此藥腐化而下緩則不救牛膝川芎蒲黃微炒丹皮各二兩當歸一兩五錢桂心四錢共為末每服五錢水煎服以上三方治胎衣不下及血入胞中之危症皆有奇效宜恪遵之產後將護法二日擇食凡產後宜專食白粥數日後以石首魚織少洗淡食之至半月後可食雞子亦須打開煮之方能養胃滿月之後再食羊肉豬蹄少許酒雖活血然氣性慓悍亦不宜多如此則產中無病產後更加健旺矣產後飲食各處風俗不同然總不外熱爛淡三字而已一二日內只宜板爛米粥加紅糖食之三四日可食白煮極透雞蛋五六日內可少食白煮豬蹄以助乳汁六日之外平日嗜食之物亦可少食以助胃氣但切忌生冷及過咸之物生化湯凡產後服一二劑祛瘀生新為妙當歸三錢黑姜五分川芎一錢五分益母草一錢桃仁炒研七粒去皮尖及雙仁者水煎服入童便少許尤佳古方生化湯當歸三錢川芎錢半炮黑姜五分桃仁五分血已行者去之流傳海內家喻戶曉忽然去炙草而加益母寧不慮去血過多乎且桃仁七粒不止五分大有攻傷新血之患不如從古為是歸薑湯治產後心慌自汗用此安之當歸三錢黑姜七分棗仁炒一錢五分大棗五枚去核水煎服若服後自汗仍多心慌無主恐其暈脫即加人參二錢熟附子一錢先顧其本方內重用當歸則瘀血不得停留人參可用世人狐疑不決多致誤事予嘗治新產大虛之人有用人參數兩而治愈者更有用十全大補加附子數十劑而治愈者倘瘀血作痛即以失笑丸間服攻補並行不相妨也此係生化之變劑因多汗而用棗仁輕者可愈重者無益一二日內非萬不得已勿用人參以防瘀血滯留附子亦非輕用之品設或陽盛而陰竭壞事即在頃刻如日收汗莫若龍骨龍骨專走氣分並無收澀敗血之慮產後血暈若瘀血上攻胸腹脹痛拒按者宜用歸芎湯下失笑丸若去血過多心慌自汗用歸姜飲加人參虛甚者更加熟附子若只胸腹脹滿失笑丸可愈若胸腹凸起而堅者非用薑黃不可重者佐以紅花又去血過多心慌自汗而虛甚者用附子乃萬不得已之事稍輕者可用人參當歸龍骨牡蠣桂圓棗仁六味代之產後不語不語之症有心病不能上通者有脾病不能運動舌本者有腎病不能上交於心者雖致病之因不同而受病之處總不出此三經耳產後不語多由心腎不交氣血虛弱縱有微邪亦皆由元氣不足所致古方七珍散主之若兼思慮傷脾倦怠少食更佐以歸脾湯若兼氣血兩虛內熱哺熱更佐以八珍湯若兼脾虛生痰食少嘔惡更佐以六君子湯若兼腎氣虛寒厥冷痹痛更佐以地黃飲子若兼水虛火炎內熱面赤更佐以六味地黃湯如此調治自應痊愈倘妄行祛風攻痰失之遠矣心病必多汗神驚生化湯加柏子仁棗仁益智仁龍骨桂圓脾病必不思食目睛黃生化湯加白朮菟絲子腎病必腰痛生化湯加杜仲骨碎補枸杞以上三條若在三日之後皆加人參心腎不交應用桂圓棗仁遠志杜仲炒枸杞熟地等七珍散藥品雜亂猛烈不可用也歸脾湯法亦必四五日後可用若一二日內照前議重用白朮桂圓力宜地黃飲子不如八味丸去附子澤瀉六味地黃湯法亦應去澤瀉恐泄腎氣也產後發熱大凡風寒發熱晝夜不退血虛與傷食則日哺發熱清晨即退是以二症相似也然傷食之症必吞酸噯腐胸膈滿悶顯然可辨若血虛症則無此等症候然產後復有氣血大虛惡寒發熱煩躁作渴乃陽隨陰散之危症宜用十全大補湯如不應更加附子若嘔吐瀉利食少腹病脈沉細或浮大無力更佐以理中湯此皆虛寒假熱之候沒誤認為火而清之禍如反掌風寒發熱必有頭痛鼻塞聲重流清涕等症輕者生化湯內加蘇葉熟地大棗生薑取微汗而愈嗽者生化湯內加前胡五分防風五分以散之遲則風入肺里必變勞症若現三陽表症者急於生化湯中按經用表藥多加熟地以助真陰多用炙草以安中氣若三日之後必加人參方能送邪外出此指三陽表症而言若風入子臟另有專門凡治將脫之症人參附子熟地之中必加龍骨方能奏效藥少功捷可兼十全理中之功十劑曰澀以止脫龍骨牡蠣之屬是也產後癲狂產後癲狂及狂言譫語乍見鬼神其間有敗血上衝者有血虛神不守舍者大抵敗血上衝則胸腹脹癰惡露不行宜用澤蘭湯並失笑丸若血虛神不守舍則心慌自汁胸腹無苦宜用安神定志丸倍人參加歸芎主之歸芎湯亦得此症多由心脾氣血不足神思不寧所致非補養元氣不可倘視為實症而攻之禍不旋踵因惡露不行而致癲狂譫語者是敗血業歸心實乃險症大用蘇木薑黃十中可全一二此外則因虛者多歸脾湯為是不腹瀉者重加當歸仍加桃仁五分一日之內原方去參耆木香只留白朮二日外只支木香黃耆五日外即照成方可也然此症實有邪魁者居多照前法加龍骨虎骨蒼朮房內焚蒼朮獨活降香屢經奇驗心神驚悸產後心神驚悸或目睛不轉語言健忘皆白心血空虛所致夫人之所主者心心之所主者血心血一虛神氣不守驚悸所由來也法當補養氣血力主此係心膽二經之症棗仁即心膽二經之藥用以為主二日之內棗仁桂圓炙草煅龍骨三四日酌而加硃砂人參五六日加杜仲熟地七日外歸脾湯去木香加硃砂尤骨汗多變症產後汗出不止皆由陽氣頓虛腠理不密而津液妄泄也急用十全大補湯止之如不應用參附耆附朮附等湯若病勢危急則以參耆朮三湯合飲之如或汗多亡陽遂變為痙其症口噤咬牙角弓反張尤為氣血大虛之惡候更當速服前藥庶可救療或問無汗為剛痙有汗為柔痙古人治以小續命湯者何也答曰此外感發痙也病屬外感則當祛邪為急若產後汗多發痙此內傷元氣氣血大虧筋無所養虛極生風藉非十全大補加附子安能斂汗液定搐搦而救此垂危之症乎痙者強也脊背太陽兩大筋強硬項不能轉搖也在雜症中為太陽液虛法用花粉桂枝若口噤咬牙角弓反張自是風症與痙病原不能涉此篇所論產後之痙乃血虛不能養筋血枯則生內風自是一串之症不妨則為一篇但病名未分後學難以認病當名之曰因虛成痙痙重生風則一目瞭然矣自以大補氣血為主更以養筋柔筋為要附子大能傷陰血煎而愈耗筋爍而益枯不可輕用謹遵各書治剛痙大意參以產後用藥之法擬藥以俟高明二日內痙而未生風者熟地當歸阿膠黑芝麻生杜仲豬脊髓本人頭髮灰三日之內加人參已生風者加魚鰾五日之內加黃耆六日之外用十全大補湯加鉤藤羚羊角無不愈矣產後身痛戶後遍身疼痛良由生產時育節開張血脈空虛不能榮養或敗血乘虛而注於經絡皆令作癰大法若遍身疼痛手按更痛者是瘀血凝滯也用四物湯加黑薑桃仁紅花澤蘭補而化之若按之而痛稍止此血虛也用四物湯加黑薑人參白朮補而養之其或有兼風寒者則發熱惡寒頭痛鼻塞口出火氣斯為外感宜用古拜散加當歸川芎秦艽黑姜以散之散後病未除恐血虛也宜用八珍湯以補之此治身痛之大法也第一段主瘀血第二段主血虛治法皆善闕血多為寒氣凝滯不妨加肉桂五分威靈仙二三分取效更速產後受風症分深淺初得者發熱惡寒頭痛口出火氣邪尚在經絡也以華佗愈風散治之若手指漸漸搐溺目系漸漸牽動是邪入血海將入子臟豆淋酒治之若眼睛上吊角弓反張口喎牙緊是邪已入子臟矣蟬退魚鰾散主之若無此三症而現三陽表症者按經用藥已詳於前華佗愈風散荊芥穗炒三錢為要熱童便沖服加童便少不足沖熱再加熱黃酒豆淋酒黑豆二兩干母雞糞一兩荊芥穗二錢惡露不行加紅花三分入砂鍋內同炒炒至黑色起煙時以滾黃酒沖之攪勻去渣飲酒蟬退魚螵散魚螵一兩用蛤粉炒為珠研為細末分三次服每次用蟬蛻三個煎湯送下如無蛤粉即用黑豆麵和乾雞糞末炒螵亦可曾經試驗也產婦腰痛書云腰以下皆腎所主因產時勞傷腎氣以致風冷客之則腰痛凡腰痛上連脊背下連腿膝者風也若獨自腰痛者虛也風用獨活寄生湯虛用八珍湯加杜仲續斷肉桂之屬若產後惡露不盡流注腿股痛如錐刺手不可按速用桃仁湯消化之免作癰腫凡病虛則補之實則瀉之虛中有實實中有虛補瀉之間更宜斟酌焉此症以腎虛為主有因風者有因寒者無非乘虛而入若專一治風恐致汗脫亡陽本草稱杜仲治腰痛殊功景岳稱枸杞佐熟地治虛損腰痛如神總不外此三藥而已風襲者加獨活寒襲者加肉桂寒甚者桂附八味地黃丸加杜仲應手取效至於血停留一段多在胸腹流注腰間甚少存此以備一格縱有此症亦多為寒氣疑滯所列桃仁湯中酌加桂子可也惡露不絕產後惡露不絕大抵因產時勞傷經脈所致也其症若肝氣不和不能藏血者宜用逍遙散若脾氣虛弱不能統血者宜用歸脾湯若氣血兩虛經絡虧損者宜用八珍湯產後必十日左右血不止者方謂之不絕其人面黃唇白總由於虛歸脾湯去木香加煮文葉阿膠續斷汗多者加龍骨無有不愈有兼瀉者再加赤石脂肉豆蔻凡此症多有大汗一泄手指即冷頃刻變症較尋常崩漏重十倍也產後心腹諸痛產後心腹諸病若非風冷客之飲食停之則為瘀血凝積然產後中氣虛寒多致暴痛直各審其因而藥之大法風寒者口鼻氣冷停食者吞酸滿悶俱用二香散主之瘀血者轉側若刀錐之刺手不可按痛而不移失笑丸主之中氣虛寒者腹中冷痛按之稍止熱物熨之稍松理中湯加桂心主之若小腹痛氣自臍下逆沖而上忽聚忽散者此瘕氣也橘核丸主之若小腹痛處有塊不可手按此瘀血壅滯有曰兒枕痛並用前失笑丸瘀血行而痛止矣風寒停食兩症辨之極明所列二香散方縮為小劑湯藥用之屢效慈按風寒停食二者隨症加藥注於方下二香散散寒消食砂仁木香黑姜除皮炙甘草各一兩香附薑汁炒三兩共為末每服二錢生薑湯調下兼風者必有外感加炒過荊芥穗兼寒者加紅豆蔻二三粒兼食者加神麯麥芽瘀血一段若在心坎骨上危症也生化湯加薑黃在心之下臍之上者加延胡索在臍之下者加橘核小茴香砂仁中氣虛寒一段重者用理中湯輕者用白朮神麯蒸過良薑二三分小腹痛一段即用橘核丸加熟地小茴香桂枝兒枕痛一段不必用失笑丸即用生化湯加小茴香桂枝可也以上各症十中九虛若在二三日後可酌加人參或代以熟地蓐勞產後氣血空虛真元未復有所作勞則寒熱食少頭目四肢脹痛名曰蓐勞最難調治大法陽虛則惡寒陰虛則發熱清氣不升則頭痛血氣不充則四肢痛宜用大劑八珍湯以補之若牌虛食少即用六君子加炮姜以溫補之諸症自退蓐勞乃產後虛症惟當急補尤宜斂汗輕者棗仁重者龍骨防瀉須服肉豆蔻補氣之藥一二日炙草大棗三四日用參五六日用耆補血之藥重者熟地桂元輕者當歸一定之法也喘促新產後喉中氣急喘促因榮血暴竭衛氣無依名曰孤陽最為難治直用六味湯加人參以益其陰若脾肺兩虛陽氣不足宜用四君子湯加黑姜當歸以益其陽若自汗厥冷更加附子若兼外感即於四君方內加荊芥陳皮炮姜川芎當歸以散之此篇所論益陰益陽之法盡美盡善惟六味湯中可酌去澤瀉且尚遺治下一法經曰諸短氣喘皆由於下況產後肝腎散漫之時乎法當熟地何首烏並用佐以鹿茸枸杞沙苑重者加磁石俟喘定肺寧再用人參補之有外感者仍服前藥安穩根基之後另用華佗愈風散現三陽表症者隨經加藥鼻黑鼻衄產後口鼻起黑氣及鼻衄皆由氣血空虛榮症散亂乃胃敗肺絕之危症也急用二味參蘇飲加附子間有得生者鼻黑是胃氣將絕之候突屬危症附子理中湯加大棗粳米十中或全一二斷非參蘇二味所能奏功若鼻中衄血多因惡露不行反而湧上胎產秘書中用生化湯加龜甲心透任脈則衝脈自開血行衄止推而廣之不外引血下行蘇木茜草皆可加也若惡露已行而衄血者是產後陰虛督脈孤陽上湧可瀉督脈曾見前輩用豬脊髓下截煎湯加炒黑梔棕灰地骨皮炒黑丹皮龜板膠病已垂危一劑而愈外以本人頭髮燒灰吹之產後乳疾婦人產後有乳少者有吹乳者有妒乳者乳為氣血所化若元氣虛弱則乳汁不生必須補養氣血為主若乳房焮脹是有乳而未通也宜疏導之後有乳兒之際為兒口氣所吹致令乳汁不通壅滯腫痛不急治即成乳癰速服瓜蔞散敷以香附餅立見消散乳少及乳汁不通二症皆以豬前蹄一對加王不留行三錢當歸二錢煎湯徐飲乳汁自通壅腫者所列瓜蔞散方內須加皂刺當歸各二錢方效按本草綱目用京三稜三四個濃煎湯俯身將乳浸其中三刻即效亦經屢試矣乳癰乳岩乳卸乳癰初起若服瓜蔞散敷以香附餅即見消散如已成膿則以神仙太乙膏貼之吸盡膿自愈矣乳岩初起若用加味逍遙散加味歸脾湯二方間服亦可內消及其病勢已成雖有廬扁亦難為力但當確服前方補養氣血縱未脫體亦可延生若妄用行氣破血之劑是速其危也更有乳卸症乳頭拖下長一二尺此肝經風熱發泄也用小柴胡湯加羌活防風主之外用羌活防風白斂燒煙薰之仍以蓖麻子四十九粒麝香一分研爛塗頂心俟乳收上急洗去乳癰乳岩二症醫宗金鑑外科均有專門詳而且善可參考之乳岩一症若其核大如桃杏而堅者是病勢已成最為難治只好調補氣血萬勿妄用行氣破血之劑以速其危篇中所論老成之見也乳卸怪症也如遇之宜遵篇中之法治之景岳全書於此症偏主於補然濕熱熏利徒補恐變他症宜遵此書為善婦人隱疾婦人隱疾前陰諸疾也有陰腫陰癢陰瘡陰挺下脫諸證其腫也或如菌如蛇如帶如雞冠種種不一而推其固總不外子濕熱也古方九味蘆薈丸主之若兼怒動肝火佐以加味逍遙散若肝經濕熱極盛佐以龍膽瀉肝湯若脾虛氣弱中氣下陷佐以補中益氣湯若思慮傷脾脾氣鬱結佐以加味歸脾湯若腎水不足佐以六味丸加歸芍庶克收功此篇所列各方皆是古法可以遵用但是症氣虛下陷者多須兼以補中益氣法行之外治之法甚多詳載本草綱目主治下可參考之附錄梁茂名舌鑑辨正總論舌根主腎命大腸應小腸膀胱舌中左主胃右主脾舌前面中間屬肺舌尖主心心包絡小腸膀胱應大腸命舌邊左主肝右主膽舌尖應上焦舌中應中焦舌根應下焦白舌總論白舌為表證有之里證有之而虛者熱者實者亦有之不獨傷寒始有白舌而白舌亦可以辨傷寒其類不一白浮滑薄苔刮去即還者太陽表寒邪也白浮滑而帶膩帶漲色分各經刮之有淨有不淨者邪在半表半裡也全舌白苔浮漲浮膩漸積而干微厚刮不脫者謂刮去其面而其底仍有寒邪欲化火也辨傷寒舌大約如此至若雜病之人舌白嫩滑刮之明淨者裡虛寒也無苔有澤濕而光滑其白色與舌為一刮之不起垢泥是虛寒也口唇必潤澤白厚粉濕滑膩苔刮稍淨而又積如麵粉發水形者裡寒濕滯也白粗澀有朱點有罅紋之苔粗澀則不光澤朱點則顯其臟腑有熱裂紋多因誤服溫藥之故白乾膠焦燥滿苔刮不脫或脫而不淨者裡熱結實也此舌頗多其苔在舌比之面上傳粉刮之多垢其白色與舌為二物是熱也與前論之虛寒舌相反當認明此苔由淺而深將黃米黃或竟變黑者也不可用溫補藥苔白苔夾變別色者宜於望聞問切四事參考之庶幾不差黃舌總論黃苔者表裡實熱證有之表裡虛寒證則無刮之明淨即為無病必須清潔光明見淡紅潤澤之底凡言淨者皆仿此刮之不淨均是熱症刮後仍留粗澀垢膩如薄漿糊一層者或竟刮不脫者淺黃微薄者微熱之於澀深黃膩厚者大熱也芒刺焦裂老黃或夾灰黑色者極熱也黃苔見於全舌為臟腑俱熱見於某經即某經之熱表裡證俱如此辨乃不易之理也治里證分經辨准對證用藥必不差訛表證風火暑燥皆有黃舌惟傷寒邪在太陽少陽時均無黃苔待邪入陽明府其舌必黃初淺久深甚則老黃或夾變灰黑其證多大熱大渴或無汗或自汗譫語痞結咽乾目暗大小便秘衄血吐血蓄血如狂自利清水不等以舌脈相較審證無誤若邪火里逼實熱里結緒危證其脈往往伏代散亂奇怪難憑重病久病亦然更有輕病而脈即伏亂者則當舍脈憑舌專經急治斯為盡善若泥於火乘土位故有黃苔之說迂執誤人矣黑舌總論凡舌苔見黑色病必不輕寒熱虛實各證皆有之均屬裡證無表證也在傷寒病寒邪傳裡化火則舌苔變黑自舌中黑起延及根尖者多自根尖黑起者少熱甚則芒刺干焦罅裂其初必由白苔變黃由黃變黑甚至刮之不脫濕之不潤者熱極傷陰也病重脈亂舍脈憑舌宜用十全苦寒湯以補陽火之偏急下以救真陰之弊在雜病見黑苔皆因實熱傷里也亦惟連瀉熾火勿使枯竭若虛寒而舌黑者則必濕滑無苔多澤口不苦唇不燥無朱點無芒刺罅裂刮之明淨如水浸豬腰有淡淡融融之形是臟腑極寒之舌也宜用十全辛溫救補湯亦有真寒假熱證而見黑舌者其舌必全黑而不分經且必由淡白之時忽然轉黑其初無變黃之一境約略望之似有焦黑芒刺干裂之狀然刮之必淨濕之必潤環唇皆白而不紅焦寒結在臟也其證亦周身大熱煩燥惡衣被與實熱邪火證相似實則中宮寒極陽氣盡發於外也口大渴喜冷飲水卻不多與實熱諸證略異外假熱而里極寒也患此假證之人必煩亂昏沉六脈必遲弱無力大便結常欲下而不下宜十全甘溫救補湯更有陰虛腎水虧而舌黑者頗似寒舌之光亮無苔又似熱舌之焦乾無澤詳審乃可無誤治宜六味地黃湯加減急投然陰虛內傷之舌大看絳色無苔若腎絕舌黑過尖言歸於命則無洽法有吸菸之人常多黑舌看法與平人之舌黑減一二等算又有食物而染黑者宜明辨之灰舌總論灰色不列五色乃色之不正也舌見灰色病概非輕均里證無表證有實熱證無虛寒證有邪熱傳裡證有時疫流行證鬱結停胸證蓄血如狂證其證不一而治法寒涼攻下寒涼以救真陰攻下以除穢毒在當用之時不得訾為找伐焉舌鑑舊載總論謂熱傳三陰則有灰黑乾薹皆當攻下泄熱是也義謂直中三陰見灰黑無苔者當溫經散寒此說甚謬蓋灰黑與淡黑色頗相似惟灰則黑中帶紫淡則黑中帶白之殊耳若寒邪直中三陰者其色淡黑無苔宜溫經散寒如邪熱直中三陰者其舌灰黑無苔宜三黃白虎大承氣並用連投直出直人其害非輕願望舌者小心謹慎焉紅舌總論全舌淡紅不淺不深者平人也有所偏則為病表裡虛實熱證皆有紅舌惟寒證則無之如全舌無苔色淺紅者氣血虛也色深紅者氣血熱也赤紅者臟肺俱熱也色紫紅瘀紅者臟腑熱極也中時疫者有之誤服溫補者有之色鮮紅無苔無點無澤澤舌底出無液液舌面浮者陰虛火炎也有苔可作熱論虛極不能生苔色灼紅無苔無點光亮如錢或半舌薄小而有直紋或有泛漲而似膠非膠或無澤液而咽乾帶澀不等紅光不活絳色難名如豬腰將腐難以言狀水涸火炎陰虛已極也瘦人多火偏於實熱醫者拘於外貌輒指為虛誤服溫補灼傷真陰或誤服滋補名為滋陰降火實則膩澀酸斂膠黏實熱引火入陰分漸耗真陰亦成絳色而為陰虛難療矣其初必有黃苔醫者不知久之內傷已甚不能顯苔而變絳色矣凡陰虛火旺之病自生者極少多由醫家誤用補藥逼成也不論病狀如何見絳色則不吉舌鑑舊載總論引仲景云冬傷於寒春變為溫至夏變為熱故舌紅面赤此專指溫疫於傷寒也而紅舌各病實非溫疫傷寒所可賅括勿泥古以致誤紫舌總論紫見全舌臟腑皆熱極也見於舌之某經即某經鬱熱也傷寒邪化火者中時疫者內熱薰蒸者誤服溫補者酒食濕滯者皆有紫舌有表裡實熱證無虛寒證若淡紫中夾別色則亦有虛寒證凡辨色無苔則論舌之本色有則憑苔之見色參之望聞問切以判表裡寒熱虛實之真假雖不中不遠矣餘數十年來但知有紫色舌未聞有紫苔舌但見紫舌為各種熱證未聞屬酒後傷寒舊本專指酒後傷寒未免拘執黴醬舌總論黴醬色者有黃赤兼黑之狀乃臟腑本熱而夾有宿食也凡內熱久郁者夾食中暑者夾食生寒傳太陰經者皆有之見此舌不論何證何脈皆屬裡證實熱證無表證虛寒證舊論謂苔薄用桂枝湯加枳橘半夏苔色厚為土邪剋水鮮有得愈者皆謬說也藍舌總論藍者綠與青碧相合猶染色之三藍也舌見藍色而尚能生苔者臟腑雖傷未甚猶可醫治若光藍無苔者不論何證何脈皆屬氣血極虧勢難延年舊論泥於五行謂金木相併火土氣絕不分有苔無苔概云不治亦管窺之見耳梁茂名者茂名梁玉瑜特岩先生也舌鑑辨正二卷即梁氏家傳辨舌之法秀水陶保廉輯錄先祖以其條分縷析言簡意賅審證論治塗中肯綮錄之以備參酌此書於清光緒間由蘭州固本書局刻印流傳不廣特抄為附錄供讀者參考附方十全苦寒湯石膏知母黃芩黃連黃柏芒硝大黃枳實厚樸犀角十全辛溫救補湯附子乾薑肉桂豆蔻木香陳皮半夏川椒丁香藿香十全甘溫救補湯生耆人參白朮九地川芎歸身鹿茸白芍茯神甘草
